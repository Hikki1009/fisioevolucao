<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1e6b3f"/>
<title>FisioEvolução</title>
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1e6b3f;--g2:#2d8a52;--g3:#d1fae5;--g4:#f0fdf4;
  --sl:#1e293b;--sl2:#475569;--sl3:#94a3b8;--sl4:#cbd5e1;
  --bg:#f1f5f2;--card:#fff;--borda:#e2e8e4;
  --red:#dc2626;--redbg:#fee2e2;
  --amber:#d97706;--amberbg:#fef3c7;
  --green:#16a34a;--greenbg:#dcfce7;
  --blue:#2563eb;--bluebg:#dbeafe;
  --purple:#7c3aed;--purplebg:#ede9fe;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--sl);min-height:100vh;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit}

#app{padding-bottom:68px;min-height:100vh}
#topo{background:var(--g1);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#topo-logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
#topo-titulo{display:none}
#topo-titulo span{color:#4ade80}
#btn-vol{background:var(--g1);color:#fff;border:2px solid rgba(255,255,255,.4);border-radius:10px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;display:none;white-space:nowrap;flex-shrink:0}
#conteudo{max-width:720px;margin:0 auto;padding:12px}
#nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borda);display:flex;z-index:50;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px 8px;background:none;border:none;border-top:2px solid transparent;color:var(--sl3);font-size:10px;font-weight:500;cursor:pointer;transition:.15s;position:relative}
.nb svg{width:20px;height:20px;stroke-width:2}
.nb.on{color:var(--g1);border-top-color:var(--g1);font-weight:700}
.nb-bdg{position:absolute;top:3px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:800;min-width:16px;text-align:center;display:none}
.fab{position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--g1);color:#fff;font-size:26px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(30,107,63,.4);z-index:40;font-weight:700}
.card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--borda);margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-p{background:var(--g1);color:#fff}.btn-s{background:var(--bg);color:var(--sl2);border:1px solid var(--borda)}.btn-d{background:var(--redbg);color:var(--red)}.btn-a{background:var(--amberbg);color:var(--amber)}.btn-b{background:var(--bluebg);color:var(--blue)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}.btn-bl{width:100%}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700}
.bg-g{background:var(--g3);color:var(--g1)}.bg-r{background:var(--redbg);color:var(--red)}.bg-a{background:var(--amberbg);color:var(--amber)}.bg-b{background:var(--bluebg);color:var(--blue)}.bg-s{background:var(--bg);color:var(--sl2)}.bg-p{background:var(--purplebg);color:var(--purple)}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:10px;font-weight:800;color:var(--g1);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--borda);border-radius:8px;color:var(--sl);background:#fff;outline:none;transition:.15s;font-size:14px}
.fi:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(30,107,63,.1)}
textarea.fi{resize:vertical;min-height:76px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fsec{background:var(--g4);border-radius:10px;padding:12px;margin-bottom:11px;border:1px solid var(--g3)}
.fsec-t{font-size:10px;font-weight:800;color:var(--g1);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.trow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--borda)}
.trow:last-child{border:none}
.trow-l h4{font-size:13px;font-weight:600}.trow-l p{font-size:11px;color:var(--sl3);margin-top:2px}
.tog{position:relative;width:42px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-s{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;cursor:pointer;transition:.2s}
.tog-s:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tog-s{background:var(--g1)}
.tog input:checked~.tog-s:before{transform:translateX(18px)}
.modal{background:var(--card);color:var(--sl);border-radius:16px;padding:20px 18px 32px;width:calc(100% - 32px);max-width:640px;overflow-x:hidden;margin:16px auto 32px;display:block;position:relative}.modal::-webkit-scrollbar{width:8px}.modal::-webkit-scrollbar-thumb{background:var(--g1);border-radius:4px}.modal::-webkit-scrollbar-track{background:var(--g3)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mh h3{font-size:16px;font-weight:800}
.mc{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--sl2);display:flex;align-items:center;justify-content:center}
#login-sc{position:fixed;inset:0;background:linear-gradient(150deg,var(--g1) 0%,#0d4726 100%);z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px}
.lbox{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:370px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.lerr{font-size:12px;color:var(--red);background:var(--redbg);padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none}
.gw{overflow:auto;border-radius:10px;border:1px solid var(--borda);max-height:calc(100vh - 170px);scrollbar-width:auto;scrollbar-color:var(--g1) var(--g3)}.gw::-webkit-scrollbar{width:8px;height:8px}.gw::-webkit-scrollbar-thumb{background:var(--g1);border-radius:4px}.gw::-webkit-scrollbar-track{background:var(--g3)}
.grade{display:grid;background:#fff;min-width:460px;padding-bottom:100px}
.gh{background:var(--g1);color:#fff;padding:5px 3px;text-align:center;font-size:10px;font-weight:700;position:sticky;top:0;z-index:2}
.ghora{background:var(--g4);color:var(--g1);padding:4px 3px;text-align:center;font-size:10px;font-weight:700;border-right:1px solid var(--borda);border-bottom:1px solid var(--borda);position:sticky;left:0;z-index:1}
.gc{padding:2px;border-right:1px solid var(--borda);border-bottom:1px solid var(--borda);min-height:36px;cursor:pointer;transition:.1s}
.gc:hover{background:var(--g4)}.gc.hj{background:#f0fdf4}
.gev{padding:2px 4px;border-radius:4px;font-size:9px;font-weight:700;margin-bottom:1px;line-height:1.3;word-break:break-word;cursor:pointer;border-left:3px solid transparent}

.nsem{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nsem strong{font-size:13px;font-weight:700}
.nbtn{background:var(--bg);color:var(--sl2);border:1px solid var(--borda);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:600}
.pac{background:var(--card);border:1px solid var(--borda);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.15s}
.pac:hover{border-color:var(--g1)}
.av{width:42px;height:42px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--g1);flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.ptab{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;padding-bottom:2px}
.ptab::-webkit-scrollbar{display:none}
.pt{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--borda);background:var(--card);color:var(--sl3);white-space:nowrap;flex-shrink:0;transition:.15s}
.pt.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.evo-item{border-left:3px solid var(--g1);padding:10px 12px;margin-bottom:10px;background:var(--g4);border-radius:0 8px 8px 0}
.sess-item{background:var(--card);border-left:4px solid var(--g1);border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--sl);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:1000;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

body.tema-escuro{
  --g1:#1a5c35;--g2:#236b40;--g3:#1a3d28;--g4:#152e1e;
  --sl:#e2e8f0;--sl2:#cbd5e1;--sl3:#94a3b8;--sl4:#64748b;
  --bg:#0f172a;--card:#1e293b;--borda:#334155;
}


::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--g4);border-radius:3px;}
::-webkit-scrollbar-thumb{background:var(--g2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--g1);}



body.tema-escuro .gh.on,body.tema-escuro .gh[style*='background']{color:#4ade80 !important;}
body.tema-escuro .av{color:#fff !important;}
body.tema-escuro a[style*="color:var(--g1)"]{color:#fff !important;}
body.tema-escuro [style*="color:var(--g1)"]{color:#e2e8f0 !important;}
body.tema-escuro .ghora{background:#1e293b !important;color:#e2e8f0 !important;border-color:#334155 !important;}
body.tema-escuro .grade{background:#0f172a !important;}
body.tema-escuro .gw{border-color:#334155 !important;}
body.tema-escuro .gc{color:#e2e8f0 !important;background:#0f172a !important;border-color:#334155 !important;}
body.tema-escuro .gh{background:#1e293b !important;color:#e2e8f0 !important;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi-an{animation:fi .2s ease}


@media(min-width:768px){
  #agenda-layout{display:flex;gap:16px;align-items:flex-start;}
  #agenda-sidebar{width:155px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;position:sticky;top:70px;}
  #agenda-main{flex:1;min-width:0;}
  #agenda-sidebar .btn{width:100%;justify-content:flex-start;}
  #agenda-sidebar .filtros-tipo{display:flex;flex-direction:column;gap:6px;}
  #filtros-tipo-mobile{display:none !important;}
  #agenda-acoes-mobile{display:none !important;}
}
@media(max-width:767px){
  #agenda-sidebar{display:none !important;}
}

#sino-btn{position:relative;background:none;border:none;cursor:pointer;color:#fff;padding:4px 8px;font-size:20px;display:flex;align-items:center;}
#sino-badge{position:absolute;top:-2px;right:0;background:#ef4444;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:800;min-width:16px;text-align:center;display:none;}
#sino-painel{position:fixed;top:60px;right:8px;width:320px;max-width:calc(100vw - 16px);background:var(--card);border:1px solid var(--borda);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:200;display:none;max-height:70vh;overflow-y:auto;}
</style>

<script>
var D = {
  pacientes:[],sessoes:[],feriados:[],
  planos:[{id:'p1',nome:'Particular',valor:0},{id:'p2',nome:'SUS',valor:0}],
  tipos:[{id:'t1',nome:'Particular',cor:'#2563eb'},{id:'t2',nome:'Clínica',cor:'#dc2626'},{id:'t3',nome:'Domiciliar',cor:'#d97706'},{id:'t4',nome:'Avaliação',cor:'#7c3aed'}],
  cfg:{usarGrafico:true,usarAnamnese:false,usarNotas:false,usarTermo:false,horaIni:7,horaFim:20},
  notas:''
};

// ── Persistência ──────────────────────────────────────────────────
function salvar(){
  ['pacientes','sessoes','feriados','planos','tipos','cfg','notas'].forEach(function(k){try{localStorage.setItem('fe_'+k,JSON.stringify(D[k]));}catch(e){}});
  salvarHistórico();
  _dadosSujos = false;
  if(FBU&&FBD) fbSync();
}

function carregar(){
  ['pacientes','sessoes','feriados','planos','tipos','notas'].forEach(function(k){try{var v=localStorage.getItem('fe_'+k);if(v!=null)D[k]=JSON.parse(v);}catch(e){}});
  try{var c=localStorage.getItem('fe_cfg');if(c)D.cfg=Object.assign({},D.cfg,JSON.parse(c));}catch(e){}
}

// ── Firebase ──────────────────────────────────────────────────────
var FBAuth=null,FBD=null,FBU=null,LMODO='entrar';
function fbInit(){
  function ld(s){return new Promise(function(r){var el=document.createElement('script');el.src=s;el.onload=r;document.head.appendChild(el);});}
  ld('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js')
  .then(function(){return ld('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js');})
  .then(function(){return ld('https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js');})
  .then(function(){
    firebase.initializeApp({"apiKey": "AIzaSyAhlFWV_yKj5Zze8ArMeFZrGjtcAsgtdpI", "authDomain": "fisioevolu.firebaseapp.com", "databaseURL": "https://fisioevolu-default-rtdb.firebaseio.com", "projectId": "fisioevolu", "storageBucket": "fisioevolu.firebasestorage.app", "messagingSenderId": "667764708177", "appId": "1:667764708177:web:694a184f750c767ccf7970"});
    FBAuth=firebase.auth();FBD=firebase.database();
    FBAuth.onAuthStateChanged(function(u){
      if(u){FBU=u;fecharLogin();fbCarregar();setTimeout(backupAutomatico,3000);}
      else{FBU=null;mostrarLogin();}
    });
  });
}
function fbPath(){return FBD.ref('u/'+FBU.uid);}
function fbSync(){
  if(!FBU||!FBD)return;
  var d={pacientes:D.pacientes,sessoes:D.sessoes,feriados:D.feriados,planos:D.planos,tipos:D.tipos,cfg:D.cfg,notas:D.notas};
  fbPath().set(d).catch(function(){});
}
function fbCarregar(){
  if(!FBU||!FBD){carregar();boot();return;}
  fbPath().once('value').then(function(s){
    var d=s.val();
    if(d){if(d.pacientes)D.pacientes=d.pacientes;if(d.sessoes)D.sessoes=d.sessoes;if(d.feriados)D.feriados=d.feriados;if(d.planos)D.planos=d.planos;if(d.tipos)D.tipos=d.tipos;if(d.cfg)D.cfg=Object.assign({},D.cfg,d.cfg);if(d.notas!=null)D.notas=d.notas;}
    else carregar();
    boot();
  }).catch(function(){carregar();boot();});
}

// ── Login ─────────────────────────────────────────────────────────

function loginAcao(){
  var email=el('l-email').value.trim();
  var senha=el('l-senha').value;
  if(!email||!senha){loginErr('Preencha e-mail e senha.');return;}
  if(senha.length<6){loginErr('Senha precisa ter ao menos 6 caracteres.');return;}
  if(LMODO==='cadastrar'&&!/[A-Z]/.test(senha)){loginErr('Senha deve ter ao menos uma letra maiúscula.');return;}
  if(LMODO==='cadastrar'&&!/[0-9]/.test(senha)){loginErr('Senha deve ter ao menos um número.');return;}
  var btn=el('l-btn');btn.disabled=true;btn.textContent='Aguarde...';
  if(LMODO==='cadastrar'){
    var nome=el('l-nome').value.trim();
    if(!nome){loginErr('Digite seu nome.');btn.disabled=false;btn.textContent='Criar conta';return;}
    // Verificar duplicado por e-mail
    FBAuth.createUserWithEmailAndPassword(email,senha)
    .then(function(c){return c.user.updateProfile({displayName:nome});})
    .catch(function(e){loginErr(fbErr(e.code));btn.disabled=false;btn.textContent='Criar conta';});
  } else {
    FBAuth.signInWithEmailAndPassword(email,senha)
    .catch(function(e){loginErr(fbErr(e.code));btn.disabled=false;btn.textContent='Entrar';});
  }
}
function loginEsqueci(){
  var email=el('l-email').value.trim();
  if(!email){loginErr('Digite seu e-mail primeiro.');return;}
  FBAuth.sendPasswordResetEmail(email).then(function(){toast('E-mail enviado!');}).catch(function(e){loginErr(fbErr(e.code));});
}

function el(id){return document.getElementById(id);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hoje(){return new Date().toISOString().slice(0,10);}
function fmtISO(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function fmtD(d){if(!d)return'';if(d.includes('/'))return d;var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function isoD(d){if(!d)return'';if(!d.includes('/'))return d;var p=d.split('/');if(p.length===3&&p[2].length===4)return p[2]+'-'+p[1]+'-'+p[0];return d;}
function fmtDH(ts){var d=new Date(ts);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function ini(n){if(!n)return'?';var p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function nomePac(id){var p=D.pacientes.find(function(x){return x.id===id;});return p?p.nome:'';}
function plNome(id){var p=D.planos.find(function(x){return x.id===id;});return p?p.nome:'';}
function tpNome(id){var t=D.tipos.find(function(x){return x.id===id;});return t?t.nome:'';}
function tpCor(id){var t=D.tipos.find(function(x){return x.id===id;});return t?t.cor:'#64748b';}

function stCls(st){return{agendado:'bg-b',confirmado:'bg-g',realizado:'bg-s',falta:'bg-a',adiado:'bg-p',cancelado:'bg-r',falta_prof:'bg-r',desmarcado:'bg-s',remarcado:'bg-p'}[st]||'bg-s';}

function getHoras(){var h=[];for(var i=(D.cfg.horaIni||7);i<=(D.cfg.horaFim||20);i++)h.push((i<10?'0':'')+i+':00');return h;}
function mData(e2){
  var pos=e2.selectionStart;
  var raw=e2.value.replace(/[^0-9]/g,'');
  if(raw.length>8)raw=raw.slice(0,8);
  var f=raw;
  if(raw.length>4)f=raw.slice(0,2)+'/'+raw.slice(2,4)+'/'+raw.slice(4);
  else if(raw.length>2)f=raw.slice(0,2)+'/'+raw.slice(2);
  e2.value=f;
}
function mascaraPA(inp){
  var raw=inp.value.replace(/[^0-9]/g,'');
  if(!raw){inp.value='';return;}
  // Sistólica: 2 ou 3 dígitos (ex: 120 ou 80)
  // Diastólica: 2 dígitos
  if(raw.length<=2){inp.value=raw;return;}
  if(raw.length===3){inp.value=raw;return;}
  if(raw.length===4){
    // Ex: 1208 → 120 x 80 OU 8080 → 80 x 80
    // Tentar 3+2 primeiro se primeiro dígito indica 3 dígitos
    var sys3=raw.slice(0,3);var dia3=raw.slice(3,5);
    var sys2=raw.slice(0,2);var dia2=raw.slice(2,4);
    // Se sistólica começa com 1 (100-199), usar 3 dígitos
    if(raw[0]==='1'||raw[0]==='2'){inp.value=sys3+(dia3?' x '+dia3:'');return;}
    inp.value=sys2+' x '+dia2;return;
  }
  if(raw.length>=5){
    var s=raw.slice(0,3);var d=raw.slice(3,5);
    inp.value=s+' x '+d;return;
  }
}
function mTel(e2){
  var v=e2.value.replace(/[^0-9]/g,'').slice(0,11);
  var f=v;
  if(v.length===0){e2.value='';return;}
  if(v.length<=2)f='('+v;
  else if(v.length<=6)f='('+v.slice(0,2)+') '+v.slice(2);
  else if(v.length<=10)f='('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6);
  else f='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
  e2.value=f;
}
function atualizarBadge(){

  if(sem>0){bdg.style.display='flex';bdg.textContent=sem>9?'9+':String(sem);}else bdg.style.display='none';

function baixarXLS(nome,linhas){
  // Gerar CSV UTF-8 com BOM para abrir corretamente no Excel
  var bom='\uFEFF';
  var csv=bom+linhas.map(function(l){return l.map(function(c){var s=String(c==null?'':c).replace(/"/g,'""');return'"'+s+'"';}).join(';');}).join('\r\n');
  var b=new Blob([csv],{type:'application/vnd.ms-excel;charset=utf-8'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download=nome+'.xls';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},200);
}

function rInicio(el2){
  var now=new Date();var hj=hoje();var hora=now.getHours();
  var primeiroNome=FBU&&FBU.displayName?', '+FBU.displayName.split(' ')[0]+'!':'';
  var saud=(hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite')+primeiroNome;

  var sHj=D.sessoes.filter(function(s){return s.data===hj;}).sort(function(a,b){return a.hora.localeCompare(b.hora);});
  var sMes=D.sessoes.filter(function(s){var d=new Date(s.data+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano;});
  var recMes=sMes.filter(function(s){return s.statusPag==='pago';}).reduce(function(a,s){return a+(s.valor||0);},0);
  var faltas=sMes.filter(function(s){return s.status==='falta';}).length;
  var previsto=D.sessoes.filter(function(s){return s.statusPag==='pendente'&&(s.valor||0)>0;}).reduce(function(a,s){return a+(s.valor||0);},0);

function marcarStatus(btn,st){
  var sid=btn.dataset.sid;
  var s=D.sessoes.find(function(x){return x.id===sid;});

function selTipo(btn,ev){
  if(ev)ev.stopPropagation();
  var tid=btn.dataset.tid;el('ms-tipo').value=tid;
  D.tipos.forEach(function(t){
    var b=el('tbtn-'+t.id);

  });
  var t2=D.tipos.find(function(x){return x.id===tid;});
  var isC=!!(t2&&(t2.nome.toLowerCase().includes('clínica')||t2.nome.toLowerCase().includes('clinica')));
  var n=el('ms-pac-norm'),c2=el('ms-pac-clin');
  if(n)n.style.display=isC?'none':'block';if(c2)c2.style.display=isC?'block':'none';

function toggleMulti(cb){
  var w=el('ms-multi-wrap');
  if(w)w.style.display=cb.checked?'block':'none';
  if(!cb.checked){var pv=el('ms-multi-preview');if(pv)pv.style.display='none';}
  else{calcMulti();}
}
function calcMulti(){
  var multiCb=el('ms-multi');
  if(!multiCb||!multiCb.checked)return;
  var qtdEl=el('ms-qtd-clin');var valEl=el('ms-valor');var prev=el('ms-multi-preview');
  if(!qtdEl||!prev)return;
  if(!valEl||!valEl.value){prev.style.display='none';return;}
  var qtd=parseInt(qtdEl.value)||1;var val=parseFloat(valEl.value)||0;
  if(val>0&&qtd>=1){
    prev.style.display='block';
    prev.textContent='R$ '+val.toFixed(2)+' × '+qtd+' paciente'+(qtd>1?'s':'')+' = R$ '+(val*qtd).toFixed(2);
  } else {prev.style.display='none';}
}
function atualizarClin(){
  var qtdEl=el('ms-qtd-clin');var cont=el('ms-clin-pacs');if(!qtdEl||!cont)return;
  var qtd=Math.max(1,Math.min(30,parseInt(qtdEl.value)||2));var h='';
  for(var i=0;i<qtd;i++){var opts3='<option value="">Opcional...</option>'+D.pacientes.slice().sort(function(a,b){return(a.nome||'').localeCompare(b.nome||'','pt-BR');}).map(function(p){return'<option value="'+esc(p.id)+'">'+esc(p.nome)+'</option>';}).join('');h+='<div class="fg"><label>Paciente '+(i+1)+'</label><select class="fi ms-cpac">'+opts3+'</select></div>';}
  cont.innerHTML=h;
}
function autoValor(){
  var sel=el('ms-plano');var val=el('ms-valor');if(!sel||!val||val.value)return;
  var p=D.planos.find(function(x){return x.id===sel.value;});if(p&&p.valor>0)val.value=parseFloat(p.valor).toFixed(2);
}
function togglePrev(){var sel=el('ms-pag');var w=el('ms-prev-wrap');if(sel&&w)w.style.display=(sel.value==='pendente'||sel.value==='atrasado')?'block':'none';}
function toggleRec(){var t=el('ms-rec-tipo');var w=el('ms-rec-val-w');var l=el('ms-rec-lbl');if(!t||!w)return;w.style.display=t.value?'block':'none';if(l)l.textContent=t.value==='sem'?'Quantas semanas?':'Nº de sessões?';}

function salvarSessao(){
  var sid=el('ms-id').value;var tipoId=el('ms-tipo').value;
  var t2=D.tipos.find(function(x){return x.id===tipoId;});
  var isC=!!(t2&&(t2.nome.toLowerCase().includes('clínica')||t2.nome.toLowerCase().includes('clinica')));
  var pacId='';var pacsC=[];
  if(isC){document.querySelectorAll('#ms-clin-pacs .ms-cpac').forEach(function(s2){pacsC.push(s2.value||'');});}
  else{pacId=el('ms-pac')?el('ms-pac').value:'';}
  var data=el('ms-data').value;var hora=el('ms-hora').value;
  if(!data||!hora){toast('Preencha data e horário');return;}
  var planoId=el('ms-plano').value;
  if(!planoId){toast('Identifique a origem do atendimento (Plano/Convênio)');return;}

    h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">';

function rAbaGraf(p){return'<div><p style="font-size:12px;color:var(--sl3);margin-bottom:10px">Gráfico de dor e mobilidade.</p><canvas id="cvs" style="width:100%;height:200px"></canvas></div>';}
function desenharGraf(p){
  var cvs=el('cvs');if(!cvs)return;
  var evos=(p.evolucoes||[]).filter(function(e){return e.dor!=null;}).sort(function(a,b){return a.ts-b.ts;});
  var ctx=cvs.getContext('2d');var W=cvs.offsetWidth||300,H=200;cvs.width=W;cvs.height=H;
  if(evos.length<2){ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('Registre ao menos 2 evoluções com escalas.',W/2,H/2);return;}
  var pad={t:16,r:16,b:28,l:28};var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b,n=evos.length;
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(var i=0;i<=10;i+=2){var y=pad.t+cH*(1-i/10);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();ctx.fillStyle='#94a3b8';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.fillText(i,pad.l-3,y+3);}
  function ln(vals,cor){ctx.strokeStyle=cor;ctx.lineWidth=2;ctx.beginPath();vals.forEach(function(v,i){var x=pad.l+(n>1?i/(n-1):.5)*cW;var y=pad.t+cH*(1-v/10);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();vals.forEach(function(v,i){var x=pad.l+(n>1?i/(n-1):.5)*cW;var y=pad.t+cH*(1-v/10);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=cor;ctx.fill();});}
  ln(evos.map(function(e){return e.dor;}),'#dc2626');ln(evos.map(function(e){return e.mob;}),'#16a34a');
  ctx.fillStyle='#dc2626';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('● Dor',pad.l,H-6);ctx.fillStyle='#16a34a';ctx.fillText('● Mobilidade',pad.l+55,H-6);
}

function salvarPaciente(){
  var pid=el('mp-id').value;var nome=el('mp-nome').value.trim();
  if(!nome){toast('Nome obrigatório');return;}
  // Verificar duplicado (apenas no cadastro novo)
  if(!pid){var dup=D.pacientes.find(function(p){return p.nome.toLowerCase().trim()===nome.toLowerCase().trim();});if(dup){if(!confirm('Já existe um paciente com o nome "'+dup.nome+'". Deseja cadastrar mesmo assim?'))return;}}
  var tipoAtend=el('mp-tipo')?el('mp-tipo').value:'';
  var cidCod=el('mp-cid')?el('mp-cid').value.trim():'';
  var cidNome=el('cid-nome')?el('cid-nome').textContent.trim():'';
  var dados={nome:nome,dataNasc:el('mp-nasc').value,telefone:el('mp-tel').value,celular:el('mp-cel').value,celularDono:el('mp-cel-dono')?el('mp-cel-dono').value:'',celular2:el('mp-cel2')?el('mp-cel2').value:'',celular2Dono:el('mp-cel2-dono')?el('mp-cel2-dono').value:'',diagnostico:el('mp-diag').value,obs:el('mp-obs').value,atleta:el('mp-atleta')&&el('mp-atleta').checked,rua:el('mp-rua')?el('mp-rua').value:'',cidade:el('mp-cidade').value,bairro:el('mp-bairro').value,numero:el('mp-numero').value,tipoAtend:tipoAtend,cid:cidCod,cidNome:cidNome,
    pacote:el('pac-wrap')&&el('pac-wrap').style.display!=='none'?(parseInt(el('mp-pacote-qtd')?el('mp-pacote-qtd').value:0)||0):0,
    pacoteIni:el('mp-pacote-ini')?el('mp-pacote-ini').value:''
  };
  if(D.cfg.usarAnamnese)['alergias','medicamentos','cirurgias','comorbidades','pressao'].forEach(function(k){var e2=el('mp-'+k);if(e2)dados[k]=e2.value;});
  if(pid){
    if(!confirm('Confirmar alteração dos dados do paciente?'))return;
    var p=D.pacientes.find(function(x){return x.id===pid;});if(p)Object.assign(p,dados);
  } else{dados.id=uid();dados.evolucoes=[];D.pacientes.push(dados);}
  if(pid)registrarHistóricoAlteracao('Paciente editado — '+nome);
  salvar();fecharM();if(PAC_ID)renderizar();else renderPacs('');toast(pid?'Paciente atualizado!':'Paciente cadastrado!');
}
function delPaciente(pid){
  if(!confirm('Excluir paciente e todas as sessões?'))return;
  D.pacientes=D.pacientes.filter(function(x){return x.id!==pid;});
  D.sessoes=D.sessoes.filter(function(x){return x.pacienteId!==pid;});
  salvar();fecharM();PAC_ID=null;ir('pacientes');toast('Paciente excluído');
}

function buscarCid(q){
  var sugest=el('cid-sugest');if(!sugest)return;
  q=(q||'').trim();
  if(!q){sugest.style.display='none';return;}
  var qu=q.toUpperCase();var ql=q.toLowerCase();
  var res=CID10.filter(function(c){return c.c.indexOf(qu)>-1||c.n.toLowerCase().indexOf(ql)>-1;}).slice(0,8);
  if(!res.length){sugest.style.display='none';return;}
  sugest.innerHTML='';sugest.style.display='block';
  res.forEach(function(c){
    var div=document.createElement('div');
    div.style.cssText='padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9';
    div.textContent=c.c+' — '+c.n;
    div.addEventListener('click',function(){selecionarCid(c.c,c.n);});
    sugest.appendChild(div);
  });
}
function selecionarCid(cod,nome){
  var inp=el('mp-cid');if(inp)inp.value=cod;
  var nm=el('cid-nome');if(nm)nm.textContent=nome;
  var sugest=el('cid-sugest');if(sugest)sugest.style.display='none';
}

function mEvo(pid,eid){
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  var e=eid?(p.evolucoes||[]).find(function(x){return x.id===eid;}):null;
  e=e||{id:'',texto:'',dor:undefined,mob:undefined};
  var dataEvo=e.dataEvo||hoje();
  var h='<div class="mh"><h3>'+(e.id?'Editar':'Nova')+' Evolução — '+esc(p.nome)+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<input type="hidden" id="me-pid" value="'+esc(pid)+'"/><input type="hidden" id="me-eid" value="'+esc(e.id)+'"/>';

    h+='<div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start">';
    h+='<div style="font-size:18px">⚠️</div>';

    h+='<div style="font-size:12px;color:#92400e;margin-top:2px">Após salvar, você terá <strong>24 horas</strong> para editar. Após esse prazo, a evolução fica bloqueada permanentemente.</div></div>';
    h+='<span style="cursor:pointer;font-size:16px" onclick="mLeiInfo(\'Imutabilidade do Prontuário\',\'Res. COFFITO nº 424/2013\',\'A Resolução COFFITO nº 424/2013 estabelece que registros clínicos no prontuário eletrônico não podem ser alterados após sua consolidação, garantindo a integridade e confiabilidade do prontuário fisioterapêutico.\',\'https://coffito.gov.br\')">❓</span>';
    h+='</div>';
  }
  // Data do atendimento (pode ser retroativa até 1 ano)

  h+='<div class="fg" style="margin:0"><label>PA (mmHg)</label><input class="fi" type="text" id="me-pa" value="'+esc(e.pa||'')+'" placeholder="120 x 80" oninput="mascaraPA(this)" maxlength="9"/></div>';
  h+='<div class="fg" style="margin:0"><label>Saturação (%)</label><div style="position:relative"><input class="fi" type="number" id="me-sat" min="0" max="100" value="'+(e.sat!=null?e.sat:'')+'" placeholder="98" style="padding-right:28px"/><span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--sl3);font-size:13px;pointer-events:none">%</span></div></div>';

  var MODELOS=D.cfg.modelosEvo||MODELOS_DEFAULT;MODELOS.forEach(function(m,i){h+='<button class="btn btn-s btn-sm" data-idx="'+i+'" onclick="usarModelo(this.dataset.idx)">Modelo '+(i+1)+'</button>';});

function salvarEvo(){
  var pid=el('me-pid').value;var eid=el('me-eid').value;var txt=el('me-txt').value.trim();
  if(!txt){toast('Texto obrigatório');return;}
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  if(!p.evolucoes)p.evolucoes=[];
  var dEl=el('me-dor'),mEl=el('me-mob');
  var dor=dEl?parseInt(dEl.value):NaN,mob=mEl?parseInt(mEl.value):NaN;
  var paV=el('me-pa')?el('me-pa').value.trim():'';var satV=el('me-sat')?el('me-sat').value:'';var bpmV=el('me-bpm')?el('me-bpm').value:'';if(eid){var ev3=p.evolucoes.find(function(x){return x.id===eid;});if(ev3){ev3.texto=txt;if(!isNaN(dor))ev3.dor=dor;if(!isNaN(mob))ev3.mob=mob;if(paV)ev3.pa=paV;if(satV)ev3.sat=satV;if(bpmV)ev3.bpm=bpmV;}}
  else{var nv3={id:uid(),ts:Date.now(),texto:txt};if(!isNaN(dor))nv3.dor=dor;if(!isNaN(mob))nv3.mob=mob;if(paV)nv3.pa=paV;if(satV)nv3.sat=satV;if(bpmV)nv3.bpm=bpmV;var dtEvo=el('me-data-evo')?el('me-data-evo').value:hoje();nv3.dataEvo=dtEvo||hoje();p.evolucoes.push(nv3);}
  // Salvar evoluções para datas extras também
  var datasExtras=document.querySelectorAll('.me-data-extra');
  datasExtras.forEach(function(inp){
    var dtExtra=inp.value;
    if(!dtExtra)return;

// ── ALERTAS DE DADOS VITAIS ──────────────────────────────────────
function verificarDadosVitais(pid,pa,sat,bpm){
  var p=D.pacientes.find(function(x){return x.id===pid;});
  var alertas=[];
  
  // Calcular idade
  var idade=0;
  if(p&&p.dataNasc){
    var partes=p.dataNasc.split('/');
    if(partes.length===3){
      var nasc=new Date(parseInt(partes[2]),parseInt(partes[1])-1,parseInt(partes[0]));
      idade=Math.floor((new Date()-nasc)/31557600000);
    }
  }
  var fcMax=220-(idade||30);
  var ehAtleta=p&&p.atleta;
  var fcMinAlerta=ehAtleta?40:50;

  // Verificar PA
  if(pa&&pa.includes(' x ')){
    var partesPa=pa.split(' x ');
    var sys=parseInt(partesPa[0])||0;
    var dia=parseInt(partesPa[1])||0;
    if(sys>=180||dia>=110)alertas.push('🔴 PA CRÍTICA: '+pa+' — encaminhar urgente!');
    else if(sys>=160||dia>=100)alertas.push('⚠️ PA elevada: '+pa+' (limite: 160x100)');
    else if(sys<80||dia<50)alertas.push('🔴 PA CRÍTICA baixa: '+pa+' — encaminhar urgente!');
    else if(sys<90||dia<60)alertas.push('⚠️ PA baixa: '+pa+' (limite: 90x60)');
  }
  
  // Verificar Saturação
  if(sat){
    var satN=parseFloat(sat)||0;
    if(satN<90)alertas.push('🔴 SATURAÇÃO CRÍTICA: '+sat+'% — encaminhar urgente!');
    else if(satN<95)alertas.push('⚠️ Saturação baixa: '+sat+'% (normal: 95-100%)');
  }
  
  // Verificar BPM
  if(bpm){
    var bpmN=parseInt(bpm)||0;
    if(bpmN>fcMax)alertas.push('⚠️ FC elevada: '+bpm+' bpm (máx. esperada para '+idade+' anos: '+fcMax+' bpm)');
    else if(bpmN<fcMinAlerta)alertas.push('⚠️ FC baixa: '+bpm+' bpm (mín. alerta: '+fcMinAlerta+' bpm'+(ehAtleta?' — atleta':'')+')');
  }
  
  if(!alertas.length)return false;
  
  // Verificar se já houve alerta anterior
  var alertasAnt=(p&&p.alertasVitais)||[];
  var recorrente=alertasAnt.length>0;
  
  return{alertas:alertas,recorrente:recorrente};
}

function mAlertaVitais(pid,pa,sat,bpm,onContinuar){
  var res=verificarDadosVitais(pid,pa,sat,bpm);
  if(!res){onContinuar();return;}
  
  var h='<div style="text-align:center;padding:10px 0 6px">';
  h+='<div style="font-size:36px;margin-bottom:8px">'+(res.recorrente?'🔴':'⚠️')+'</div>';
  h+='<div style="font-size:15px;font-weight:800;margin-bottom:12px">'+( res.recorrente?'Alteração recorrente!':'Dados vitais alterados')+'</div>';
  h+='</div>';
  
  res.alertas.forEach(function(a){
    h+='<div style="background:#fef2f2;border-left:3px solid #dc2626;padding:8px 10px;border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;color:#7f1d1d">'+a+'</div>';
  });
  
  if(res.recorrente){
    h+='<div style="background:#fef3c7;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:#92400e">';
    h+='⚠️ Este paciente já apresentou dados vitais alterados em sessões anteriores. Recomenda-se comunicar aos familiares pessoalmente e considerar encaminhamento médico urgente.</div>';
  } else {
    h+='<div style="font-size:12px;color:var(--sl3);margin-bottom:12px">Oriente o paciente a procurar uma UPA, hospital ou especialista se os sintomas persistirem.</div>';
  }
  
  h+='<div style="display:flex;flex-direction:column;gap:8px">';
  h+='<button class="btn btn-p btn-bl" id="btn-continuar-vitais">✅ Entendido — Continuar</button>';
  h+='<button class="btn btn-s btn-bl" onclick="fecharM(true)">↩ Voltar e corrigir</button>';
  h+='</div>';
  
  abrirM(h);
  
  // Registrar alerta no histórico do paciente
  var p=D.pacientes.find(function(x){return x.id===pid;});
  if(p){
    if(!p.alertasVitais)p.alertasVitais=[];
    p.alertasVitais.push({dt:new Date().toISOString(),alertas:res.alertas});
    if(p.alertasVitais.length>10)p.alertasVitais=p.alertasVitais.slice(-10);
  }
  
  setTimeout(function(){
    var btn=el('btn-continuar-vitais');
    if(btn)btn.onclick=function(){fecharM(true);onContinuar();};
  },100);
}

function setFiltroEvo(tipo){
  var ativo=el('evo-ft-ativo');if(ativo)ativo.value=tipo;

    var b=el('evo-ft-'+t);if(b)b.className='btn btn-sm '+(t===tipo?'btn-p':'btn-s');
  });

function filtrarEvo(){
  var q=(el('busca-evo')?el('busca-evo').value:'').toLowerCase();
  var tipo=el('evo-ft-ativo')?el('evo-ft-ativo').value:'hj';
  var hj=hoje();
  var sem0=semIni(_semRef).toISOString().slice(0,10);
  var mes0=hj.slice(0,7)+'-01';
  var dtIni=hj,dtFim=hj;
  if(tipo==='sem'){dtIni=sem0;dtFim=hj;}
  else if(tipo==='mes'){dtIni=mes0;dtFim=hj;}
  else if(tipo==='per'){
    dtIni=el('evo-dt-ini')?el('evo-dt-ini').value:mes0;
    dtFim=el('evo-dt-fim')?el('evo-dt-fim').value:hj;
    // Limite 1 ano
    var d1=new Date(dtIni),d2=new Date(dtFim);
    if((d2-d1)/(864e5*365)>1)dtIni=new Date(d2.getTime()-364*864e5).toISOString().slice(0,10);
  }
  var lista=el('evo-lista');if(!lista)return;
  // Coletar evoluções no período
  var evos=[];
  D.pacientes.forEach(function(p){
    if(q&&!(p.nome||'').toLowerCase().includes(q))return;
    (p.evolucoes||[]).forEach(function(e){
      var dt=e.dataEvo||new Date(e.ts||0).toISOString().slice(0,10);
      if(dt>=dtIni&&dt<=dtFim)evos.push({pac:p,evo:e,dt:dt});
    });
  });
  evos.sort(function(a,b){return(b.evo.ts||0)-(a.evo.ts||0);});
  if(!evos.length){lista.innerHTML='<p style="text-align:center;padding:30px;color:var(--sl3)">Nenhuma evolução no período.</p>';return;}
  var h='<div style="font-size:12px;color:var(--sl3);margin-bottom:8px">'+evos.length+' evolução(ões) encontrada(s)</div>';
  evos.slice(0,50).forEach(function(item){
    var e=item.evo;var p=item.pac;
    var dtExib=e.dataEvo?fmtD(e.dataEvo):new Date(e.ts||0).toLocaleDateString('pt-BR');
    h+='<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="PAC_ID=\''+p.id+'\';PAC_ABA=\'evo\';renderizar()">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
    h+='<span style="font-size:13px;font-weight:700">'+esc(p.nome)+'</span>';
    h+='<span style="font-size:11px;color:var(--sl3)">'+dtExib+'</span>';
    h+='</div>';
    if(e.texto)h+='<div style="font-size:12px;color:var(--sl2)">'+esc(e.texto.slice(0,80))+(e.texto.length>80?'...':'')+'</div>';
    if(e.pa||e.sat||e.bpm){h+='<div style="display:flex;gap:8px;margin-top:4px">';if(e.pa)h+='<span style="font-size:11px">PA:'+esc(e.pa)+'</span>';if(e.sat)h+='<span style="font-size:11px">Sat:'+e.sat+'%</span>';if(e.bpm)h+='<span style="font-size:11px">FC:'+e.bpm+'</span>';h+='</div>';}
    h+='</div>';
  });
  if(evos.length>50)h+='<p style="font-size:11px;color:var(--sl3);text-align:center">Mostrando 50 de '+evos.length+'. Refine o filtro.</p>';
  lista.innerHTML=h;
}

function rCofre(el2){
  var bv=el('btn-vol');bv.style.display='block';bv.textContent='← Voltar';BtnVolCb=function(){ir('financeiro');};
  var now=new Date();
  var mesSel=window._cofreMes!=null?window._cofreMes:now.getMonth();
  var anoSel=window._cofreAno!=null?window._cofreAno:now.getFullYear();
  var meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var hj=hoje();

  var h='<div style="font-size:16px;font-weight:800;margin-bottom:14px">💰 Cofre</div>';
  h+='<div class="card" style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Período de referência</div>';
  h+='<div style="display:flex;gap:8px"><select class="fi" id="cofre-mes" onchange="setCofre()">';
  meses.forEach(function(m,i){h+='<option value="'+i+'"'+(i===mesSel?' selected':'')+'>'+m+'</option>';});
  h+='</select><select class="fi" id="cofre-ano" onchange="setCofre()">';
  for(var a=anoSel-2;a<=anoSel+1;a++)h+='<option value="'+a+'"'+(a===anoSel?' selected':'')+'>'+a+'</option>';
  h+='</select></div></div>';

  // Sessões do período selecionado (realizadas e pendentes)
  var sessPer=D.sessoes.filter(function(s){
    var d=new Date(s.data+'T12:00:00');
    return d.getMonth()===mesSel&&d.getFullYear()===anoSel&&s.status==='realizado';
  });

  if(!sessPer.length){
    h+='<div class="card" style="text-align:center;padding:30px;color:var(--sl3)">Nenhuma sessão realizada neste período.</div>';
    el2.innerHTML=h;return;
  }

  // Agrupar por plano
  D.planos.forEach(function(pl){
    var sessPl=sessPer.filter(function(s){return s.planoId===pl.id;});
    if(!sessPl.length)return;

    var totalVal=sessPl.reduce(function(a,s){return a+(s.valor||0);},0);
    var pagoVal=sessPl.filter(function(s){return s.statusPag==='pago';}).reduce(function(a,s){return a+(s.valor||0);},0);
    var pendVal=totalVal-pagoVal;
    var parcialData=sessPl.find(function(s){return s.statusPag==='parcial';});

    h+='<div class="card" style="margin-bottom:12px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h+='<div><div style="font-size:14px;font-weight:800">'+esc(pl.nome)+'</div>';
    if(pl.mesmoPagador)h+=' <span class="badge bg-b" style="font-size:10px">Mesmo pagador</span>';
    h+='</div></div>';
    var statusCor=pendVal===0?'var(--green)':'var(--amber)';
    h+='<div style="font-size:13px;font-weight:800;color:'+statusCor+'">'+( pendVal===0?'✅ Quitado':'⏳ Pendente')  +'</div></div>';

    // Resumo do plano
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
    h+='<div style="text-align:center;padding:8px;background:var(--g4);border-radius:8px"><div style="font-size:16px;font-weight:800;color:var(--g1)">R$'+totalVal.toFixed(2)+'</div><div style="font-size:10px;color:var(--sl3)">Total</div></div>';
    h+='<div style="text-align:center;padding:8px;background:var(--g4);border-radius:8px"><div style="font-size:16px;font-weight:800;color:var(--green)">R$'+pagoVal.toFixed(2)+'</div><div style="font-size:10px;color:var(--sl3)">Recebido</div></div>';
    h+='<div style="text-align:center;padding:8px;background:var(--g4);border-radius:8px"><div style="font-size:16px;font-weight:800;color:var(--amber)">R$'+pendVal.toFixed(2)+'</div><div style="font-size:10px;color:var(--sl3)">Pendente</div></div>';
    h+='</div>';

    // Se mesmo pagador: mostrar lista de pacientes agrupada
    if(pl.mesmoPagador){
      var pacsPl={};
      sessPl.forEach(function(s){
        var pid=s.pacienteId||'_';
        if(!pacsPl[pid])pacsPl[pid]={nome:nomePac(s.pacienteId)||'Clínica',qtd:0,val:0};
        pacsPl[pid].qtd++;pacsPl[pid].val+=(s.valor||0);
      });
      h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">Pacientes incluídos</div>';
      Object.values(pacsPl).forEach(function(p){
        h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--borda);font-size:12px">';
        h+='<span>'+esc(p.nome)+' ('+p.qtd+' sessões)</span><span style="font-weight:700">R$'+p.val.toFixed(2)+'</span></div>';
      });
    }

    // Botões de ação
    if(pendVal>0){
      h+='<div style="display:flex;gap:8px;margin-top:12px">';
      var plIds=sessPl.filter(function(s){return s.statusPag!=='pago';}).map(function(s){return s.id;}).join(',');
      h+='<button class="btn btn-p btn-sm" style="flex:1" data-plids="'+esc(plIds)+'" data-total="'+pendVal.toFixed(2)+'" onclick="mConfirmarCofre(this)">✅ Confirmar recebimento</button>';
      h+='</div>';
    }

    // Parcial pendente
    if(parcialData&&parcialData.parcialRestante>0){
      h+='<div style="margin-top:8px;padding:8px;background:var(--amberbg);border-radius:8px;font-size:12px;color:var(--amber);font-weight:600">';
      h+='⏳ Parcial: R$'+parcialData.parcialRestante.toFixed(2)+' restante previsto para '+esc(parcialData.parcialDataPrev||'data não definida')+'</div>';
    }

    h+='</div>';
  });

  el2.innerHTML=h;
}

function calcRestante(total){
  var rec=parseFloat(el('cofre-val-rec')?el('cofre-val-rec').value:0)||0;
  if(rec>total)rec=total;
  var rest=Math.max(0,total-rec);
  var pr=el('cofre-preview-rec');if(pr)pr.textContent='R$ '+rec.toFixed(2);
  var prr=el('cofre-preview-rest');if(prr)prr.textContent='R$ '+rest.toFixed(2);
  // Colorir restante
  if(prr)prr.style.color=rest===0?'var(--green)':'var(--amber)';
}

function confirmarCofreTot(btn){
  var plids=(btn.dataset.plids||'').split(',').filter(Boolean);
  plids.forEach(function(sid){
    var s=D.sessoes.find(function(x){return x.id===sid;});
    if(s){s.statusPag='pago';delete s.parcialRestante;delete s.parcialDataPrev;}
  });
  salvar();fecharM(true);ir('cofre');toast('Recebimento total confirmado! ✅');
}

function confirmarCofreParcial(btn){
  var plids=(btn.dataset.plids||'').split(',').filter(Boolean);
  var total=parseFloat(btn.dataset.total)||0;
  var rec=parseFloat(el('cofre-val-rec')?el('cofre-val-rec').value:0)||0;
  var rest=Math.max(0,total-rec);
  var dataPrev=el('cofre-data-rest')?el('cofre-data-rest').value:'';
  if(!rec||rec<=0){toast('Informe o valor recebido');return;}
  if(!dataPrev){toast('Informe a data prevista para o restante');return;}
  if(rec>=total){confirmarCofreTot(btn);return;}
  // Marcar sessões como pagas até cobrir o valor recebido
  var acumulado=0;var primeiroNãoPago=null;
  plids.forEach(function(sid){
    var s=D.sessoes.find(function(x){return x.id===sid;});
    if(!s||s.statusPag==='pago')return;
    if(acumulado+( s.valor||0)<=rec+0.01){
      s.statusPag='pago';
      acumulado+=(s.valor||0);
    } else if(!primeiroNãoPago){
      primeiroNãoPago=s;
    }
  });
  // Registrar restante na primeira sessão não paga
  if(primeiroNãoPago){
    primeiroNãoPago.statusPag='parcial';
    primeiroNãoPago.parcialRestante=rest;
    primeiroNãoPago.parcialDataPrev=dataPrev;
  }
  salvar();fecharM(true);ir('cofre');
  toast('Parcial registrado! Restante R$ '+rest.toFixed(2)+' previsto para '+fmtD(dataPrev));
}

function previewRel(tipo){
  var m=0,a=new Date().getFullYear();
  try{m=parseInt(el('rel-mes').value)||0;a=parseInt(el('rel-ano').value)||a;}catch(e){}
  var linhas=[];
  if(tipo==='fin')linhas=gerarLinhasRelFin(m,a);
  else if(tipo==='evo')linhas=gerarLinhasRelEvo(m,a);
  else if(tipo==='falt')linhas=gerarLinhasRelFalt(m,a);
  else if(tipo==='pac')linhas=gerarLinhasRelPac();
  else if(tipo==='pacotes')linhas=gerarLinhasRelPacotes();
  if(!linhas||!linhas.length){toast('Nenhum dado encontrado.');return;}
  var h='<div class="mh"><h3>Prévia do Relatório</h3><button class="mc" onclick="fecharM()">✕</button></div>';

function getPer(){var m=el('rel-mes'),a=el('rel-ano');var now=new Date();return{mes:m?parseInt(m.value):now.getMonth(),ano:a?parseInt(a.value):now.getFullYear()};}
function filtPer(){var p=getPer();return D.sessoes.filter(function(s){var d=new Date(s.data+'T12:00:00');return d.getMonth()===p.mes&&d.getFullYear()===p.ano;});}
function nomePer(){var p=getPer();var m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return m[p.mes]+'_'+p.ano;}
function relFin(){
  var ss=filtPer(),per=nomePer();

  var linhas=[['Resumo Financeiro - '+per],[''],['Total recebido','R$ '+rec.toFixed(2)],['Total pendente','R$ '+pend.toFixed(2)],['Em atraso','R$ '+atr.toFixed(2)],[''],['Por plano','Sessões','Recebido']];
  D.planos.forEach(function(pl){var s2=ss.filter(function(s){return s.planoId===pl.id;});var r=s2.filter(function(s){return s.statusPag==='pago';}).reduce(function(a,s){return a+(s.valor||0);},0);linhas.push([pl.nome,s2.length,'R$ '+r.toFixed(2)]);});
  linhas.push([''],['Data','Horário','Paciente','Plano','Valor','Status','Prev. Recebimento']);
  ss.filter(function(s){return s.valor;}).forEach(function(s){linhas.push([fmtD(s.data),s.hora,nomePac(s.pacienteId),plNome(s.planoId),(s.valor||0).toFixed(2),stL(s.status),s.dataPrevista||'']);});

}

function relFalt(){

function verificarExclusaoAgendada(){
  var agendada=localStorage.getItem('fe_excluir_em');

  var dtExclusao=parseInt(agendada);
  if(Date.now()>=dtExclusao){
    // 7 dias passaram — excluir conta
    if(!FBD||!FBU)return;
    FBD.ref('u/'+FBU.uid).remove().then(function(){
      return FBU.delete();
    }).then(function(){
      Object.keys(localStorage).forEach(function(k){if(k.startsWith('fe_'))localStorage.removeItem(k);});
      location.reload();
    });
  } else {
    // Mostrar banner de cancelamento
    var diasRestantes=Math.ceil((dtExclusao-Date.now())/(864e5));

      '🗑️ Conta será excluída em '+diasRestantes+' dia(s)',
      'Acesse Mais → Solicitar exclusão para cancelar.');

}

function escolherImagem(){

    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();

      localStorage.setItem('fe_img_fundo',ev.target.result);
      aplicarTema();fecharM();mAparencia();toast('Imagem aplicada!');
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

  h+='<div class="fg"><label>Ano</label><select class="fi" id="gf-ano" onchange="renderGraficoFin()">';
  for(var a=ano-2;a<=ano+1;a++)h+='<option value="'+a+'"'+(a===ano?' selected':'')+'>'+a+'</option>';
  h+='</select></div><div id="gf-content"></div>';
  el2.innerHTML=h;renderGraficoFin();
}
function renderGraficoFin(){
  var anoEl=el('gf-ano');var ano=anoEl?parseInt(anoEl.value):new Date().getFullYear();
  var cont=el('gf-content');if(!cont)return;
  var sAno=D.sessoes.filter(function(s){return new Date(s.data+'T12:00:00').getFullYear()===ano&&s.statusPag==='pago';});
  var total=sAno.reduce(function(a,s){return a+(s.valor||0);},0);
  if(!total){cont.innerHTML='<p style="text-align:center;padding:40px;color:#94a3b8">Nenhum recebimento em '+ano+'.</p>';return;}
  var h='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:12px">Por Plano</div>';
  D.planos.forEach(function(pl){
    var sPl=sAno.filter(function(s){return s.planoId===pl.id;});
    var val=sPl.reduce(function(a,s){return a+(s.valor||0);},0);if(!val)return;
    var pct=Math.round(val/total*100);
    h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600">'+esc(pl.nome)+'</span><span style="font-size:13px;font-weight:700">R$'+val.toFixed(2)+' ('+pct+'%)</span></div>';
    h+='<div style="height:8px;background:#e2e8f0;border-radius:4px"><div style="height:8px;background:#1e6b3f;border-radius:4px;width:'+pct+'%"></div></div></div>';
  });
  h+='<div style="border-top:1px solid #e2e8f0;padding-top:10px;display:flex;justify-content:space-between"><span style="font-weight:700">Total</span><span style="font-weight:800">R$'+total.toFixed(2)+'</span></div></div>';
  var mNm=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var dM=mNm.map(function(nm,i){var ss=sAno.filter(function(s){return new Date(s.data+'T12:00:00').getMonth()===i;});return{nome:nm,val:ss.reduce(function(a,s){return a+(s.valor||0);},0)};});
  var maxV=Math.max.apply(null,dM.map(function(d){return d.val;}))||1;
  h+='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">Mes a mes</div>';
  h+='<div style="display:flex;align-items:flex-end;gap:3px;height:100px;margin-bottom:5px">';
  dM.forEach(function(d){var p2=Math.max(4,Math.round(d.val/maxV*100));h+='<div style="flex:1;background:#1e6b3f;border-radius:3px 3px 0 0;height:'+p2+'px;opacity:'+(d.val?1:0.2)+'"></div>';});
  h+='</div><div style="display:flex;gap:3px">';
  dM.forEach(function(d){h+='<div style="flex:1;text-align:center;font-size:8px;color:#94a3b8">'+d.nome+'</div>';});
  h+='</div></div>';
  h+='<button class="btn btn-p btn-bl" onclick="exportarIR('+ano+')">Exportar para IR ('+ano+')</button>';
  cont.innerHTML=h;
}
function exportarIR(ano){
  var sAno=D.sessoes.filter(function(s){return new Date(s.data+'T12:00:00').getFullYear()===ano&&s.statusPag==='pago';});
  var total=sAno.reduce(function(a,s){return a+(s.valor||0);},0);
  var mF=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var linhas=[['Relatorio IR '+ano],['Total recebido','R$ '+total.toFixed(2)],[''],['PLANO','Sessoes','Valor','%']];
  D.planos.forEach(function(pl){var s2=sAno.filter(function(s){return s.planoId===pl.id;});var v=s2.reduce(function(a,s){return a+(s.valor||0);},0);if(v)linhas.push([pl.nome,s2.length,'R$ '+v.toFixed(2),Math.round(v/total*100)+'%']);});
  linhas.push([''],['MES','Sessoes','Valor']);
  mF.forEach(function(nm,i){var ss=sAno.filter(function(s){return new Date(s.data+'T12:00:00').getMonth()===i;});var v=ss.reduce(function(a,s){return a+(s.valor||0);},0);linhas.push([nm,ss.length,'R$ '+v.toFixed(2)]);});
  linhas.push([''],['Data','Paciente','Plano','Valor']);
  sAno.forEach(function(s){linhas.push([fmtD(s.data),nomePac(s.pacienteId),plNome(s.planoId),(s.valor||0).toFixed(2)]);});
  baixarXLS('IR-'+ano,linhas);toast('Exportado!');
}


function verificarAlertasPagamento(){
  var hoje2=new Date();var hj=hoje();
  var alertas=[];
  D.sessoes.filter(function(s){return s.statusPag==='pendente'&&s.status==='realizado'&&(s.valor||0)>0;}).forEach(function(s){
    var pl=D.planos.find(function(x){return x.id===s.planoId;});
    if(!pl)return;
    // Calcular data prevista de pagamento
    var dtSessao=new Date(s.data+'T12:00:00');
    var dtPrev=new Date(dtSessao);
    if(pl.pgMes==='seguinte'){dtPrev.setMonth(dtPrev.getMonth()+1);dtPrev.setDate(pl.pgDia||25);}
    else if(pl.pgMes==='dias'){dtPrev.setDate(dtPrev.getDate()+(pl.pgDia||30));}
    else{dtPrev.setDate(pl.pgDia||30);}
    var diffDias=Math.ceil((dtPrev-hoje2)/(864e5));
    var alerta=(pl.pgAlerta||3);
    if(diffDias<=alerta&&diffDias>=0){
      alertas.push({tipo:'chegando',pac:nomePac(s.pacienteId),plano:pl.nome,valor:s.valor,dias:diffDias,sid:s.id});
    } else if(diffDias<0){
      alertas.push({tipo:'atrasado',pac:nomePac(s.pacienteId),plano:pl.nome,valor:s.valor,dias:Math.abs(diffDias),sid:s.id});
    }
  });
  return alertas;
}

function executarBusca(){
  var ini=el('br-ini').value;var fim=el('br-fim').value;
  var planoId=el('br-plano').value;var pacId=el('br-pac').value;
  var status=el('br-status').value;
  var res=D.sessoes.filter(function(s){
    if(ini&&s.data<ini)return false;
    if(fim&&s.data>fim)return false;
    if(planoId&&s.planoId!==planoId)return false;
    if(pacId&&s.pacienteId!==pacId)return false;
    if(status&&s.statusPag!==status)return false;
    return(s.valor||0)>0;
  });
  var total=res.reduce(function(a,s){return a+(s.valor||0);},0);
  var cont=el('br-resultado');if(!cont)return;
  if(!res.length){cont.innerHTML='<p style="text-align:center;padding:30px;color:#94a3b8">Nenhum resultado encontrado.</p>';return;}
  var h='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px">';
  h+='<span style="font-size:13px;font-weight:700">'+res.length+' resultado(s)</span>';
  h+='<span style="font-size:15px;font-weight:800;color:#1e6b3f">R$'+total.toFixed(2)+'</span></div>';
  // Por plano
  var porPlano={};
  res.forEach(function(s){var k=s.planoId||'sem';porPlano[k]=(porPlano[k]||0)+(s.valor||0);});
  Object.keys(porPlano).forEach(function(k){
    var pct=Math.round(porPlano[k]/total*100);
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">';
    h+='<span>'+esc(plNome(k)||'Sem plano')+'</span><span style="font-weight:700">R$'+porPlano[k].toFixed(2)+' ('+pct+'%)</span></div>';
  });
  h+='</div>';
  h+='<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Detalhamento</div>';
  res.sort(function(a,b){return b.data.localeCompare(a.data);}).slice(0,50).forEach(function(s){
    var stCor={pago:'#16a34a',pendente:'#d97706',atrasado:'#dc2626'}[s.statusPag]||'#94a3b8';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9">';
    h+='<div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(nomePac(s.pacienteId))+'</div>';
    h+='<div style="font-size:11px;color:#94a3b8">'+fmtD(s.data)+' · '+esc(plNome(s.planoId)||'-')+'</div></div>';
    h+='<span style="font-size:12px;font-weight:700;color:'+stCor+'">R$'+(s.valor||0).toFixed(2)+'</span></div>';
  });
  if(res.length>50)h+='<p style="font-size:11px;color:#94a3b8;text-align:center">Mostrando 50 de '+res.length+'. Use filtros para refinar.</p>';
  h+='<button class="btn btn-s btn-sm" style="margin-top:10px" onclick="exportarBusca()">Exportar resultado</button></div>';
  cont.innerHTML=h;
}

function calcPacote(p){
  if(!p.pacote)return null;
  var realizadas=D.sessoes.filter(function(s){
    return s.pacienteId===p.id&&s.status==='realizado';
  }).length;
  var restantes=Math.max(0,p.pacote-realizadas);
  var pct=Math.round(realizadas/p.pacote*100);
  return{total:p.pacote,realizadas:realizadas,restantes:restantes,pct:pct};
}

function salvarEscalaDinamica(){
  var pid=el('esc-app-pid')?el('esc-app-pid').value:'';
  var escId=el('esc-app-id')?el('esc-app-id').value:'';
  var esc=getEscala(escId);
  var p=D.pacientes.find(function(x){return x.id===pid;});
  if(!p||!esc)return;
  var resultado={};var total=0;var contagem=0;
  esc.campos.forEach(function(campo){
    if(campo.tipo==='radio'||campo.tipo==='radio3'){
      var sel=document.querySelector('input[name="'+campo.id+'"]:checked');
      if(sel){resultado[campo.id]=parseInt(sel.value);total+=parseInt(sel.value);contagem++;}
    } else if(campo.tipo==='check'){
      var chk=el(campo.id);
      if(chk){resultado[campo.id]=chk.checked?1:0;if(chk.checked)total++; contagem++;}
    } else if(campo.tipo==='range'||campo.tipo==='numero'){
      var inp=el(campo.id);
      if(inp){resultado[campo.id]=parseFloat(inp.value)||0;total+=resultado[campo.id];contagem++;}
    }
  });
  var obs=el('esc-obs')?el('esc-obs').value:'';
  p.escalasDin=p.escalasDin||[];
  p.escalasDin.push({
    id:uid(),escId:escId,nome:esc.nome,cat:esc.cat,
    resultado:resultado,total:total,obs:obs,
    dt:new Date().toISOString()
  });
  salvar();fecharM();
  toast('Avaliação salva!');
  renderizar();
}

function verHistóricoEscalas(pid){
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  var hist=p.escalasDin||[];
  var h='<div class="mh"><h3>Histórico de Escalas</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  if(!hist.length){h+='<p style="text-align:center;padding:30px;color:var(--sl3)">Nenhuma escala aplicada ainda.</p>';abrirM(h);return;}
  // Agrupar por escala
  var grupos={};
  hist.forEach(function(r){grupos[r.escId]=grupos[r.escId]||{nome:r.nome,cat:r.cat,registros:[]};grupos[r.escId].registros.push(r);});
  Object.values(grupos).forEach(function(g){
    h+='<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:8px">'+g.nome+'</div>';
    h+='<div style="font-size:11px;color:var(--g1);margin-bottom:8px">'+g.cat+'</div>';
    g.registros.sort(function(a,b){return b.dt.localeCompare(a.dt);}).forEach(function(r){
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--borda)">';
      h+='<div style="flex:1"><div style="font-size:12px;color:var(--sl3)">'+new Date(r.dt).toLocaleDateString('pt-BR')+'</div>';
      if(r.obs)h+='<div style="font-size:11px;color:var(--sl3)">'+r.obs+'</div>';
      h+='</div>';
      h+='<span style="font-size:14px;font-weight:800;color:var(--g1)">'+r.total+'</span>';
      h+='<button class="btn btn-d btn-sm" data-pid="'+pid+'" data-id="'+r.id+'" onclick="delEscalaDin(this.dataset.pid,this.dataset.id)">✕</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  abrirM(h);
}

function delEscalaDin(pid,id){
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  if(!confirm('Excluir este registro?'))return;
  p.escalasDin=(p.escalasDin||[]).filter(function(r){return r.id!==id;});
  salvar();fecharM();toast('Registro excluido.');
}


function rAbaResumo(p){
  var hj=hoje();
  var h='<div style="font-size:15px;font-weight:800;margin-bottom:14px;color:var(--g1)">⚡ Resumo em 30 segundos</div>';
  
  // Diagnóstico
  h+='<div class="card" style="margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">🏥 Diagnóstico</div>';
  if(p.diagnostico||p.cid){
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h+='<div style="flex:1">';
    if(p.diagnostico)h+='<div style="font-size:13px;font-weight:600">'+esc(p.diagnostico)+'</div>';
    if(p.cid)h+='<div style="font-size:12px;color:var(--sl3)">CID: '+esc(p.cid)+(p.cidNome?' — '+esc(p.cidNome):'')+'</div>';
    h+='</div><button class="btn btn-s btn-sm" data-pid="'+esc(p.id)+'" onclick="editarDiagnostico(this.dataset.pid)" style="padding:4px 8px;font-size:12px">✏️</button></div>';
  } else {
    h+='<div style="font-size:12px;color:var(--sl3)">Não informado</div>';
  }
  // Anamnese resumo
  var an=p.anamnese||{};
  if(an.queixa)h+='<div style="font-size:12px;margin-top:4px;color:var(--sl2)"><strong>Queixa:</strong> '+esc(an.queixa)+'</div>';
  h+='</div>';

  // Sessões
  var sessoesPac=D.sessoes.filter(function(s){return s.pacienteId===p.id;});
  var realizadas=sessoesPac.filter(function(s){return s.status==='realizado';}).length;
  var proxima=sessoesPac.filter(function(s){return s.data>=hj&&s.status==='agendado';}).sort(function(a,b){return a.data.localeCompare(b.data)||a.hora.localeCompare(b.hora);})[0];
  h+='<div class="card" style="margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">📅 Sessões</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  h+='<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--g1)">'+realizadas+'</div><div style="font-size:11px;color:var(--sl3)">Realizadas</div></div>';
  h+='<div style="text-align:center"><div style="font-size:13px;font-weight:700;color:var(--g1)">'+(proxima?fmtD(proxima.data)+' '+proxima.hora:'—')+'</div><div style="font-size:11px;color:var(--sl3)">Próxima sessão</div></div>';
  h+='</div>';
  // Pacote
  var pk=calcPacote(p);
  if(pk){
    var pkCor=pk.restantes===0?'var(--red)':pk.restantes<=2?'var(--amber)':'var(--g1)';
    h+='<div style="margin-top:8px;padding:6px 8px;background:var(--g4);border-radius:6px;display:flex;justify-content:space-between;align-items:center">';
    h+='<span style="font-size:12px">📦 Pacote</span>';
    h+='<span style="font-size:13px;font-weight:700;color:'+pkCor+'">'+pk.realizadas+'/'+pk.total+' ('+pk.restantes+' rest.)</span>';
    h+='</div>';
  }
  h+='</div>';

  // Última evolução
  var evos=(p.evolucoes||[]).slice().sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  h+='<div class="card" style="margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">📝 Última evolução</div>';
  if(evos.length){
    var ult=evos[0];
    h+='<div style="font-size:11px;color:var(--sl3);margin-bottom:4px">'+(ult.dataEvo?fmtD(ult.dataEvo):new Date(ult.ts||0).toLocaleDateString('pt-BR'))+'</div>';
    h+='<div style="font-size:12px;color:var(--sl2);line-height:1.5">'+esc((ult.texto||'').slice(0,120))+(ult.texto&&ult.texto.length>120?'...':'')+'</div>';
    if(ult.pa||ult.sat||ult.bpm){
      h+='<div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap">';
      if(ult.pa)h+='<span style="font-size:11px;color:var(--blue)">PA: '+esc(ult.pa)+'</span>';
      if(ult.sat)h+='<span style="font-size:11px;color:var(--blue)">Sat: '+esc(ult.sat)+'%</span>';
      if(ult.bpm)h+='<span style="font-size:11px;color:var(--blue)">FC: '+esc(ult.bpm)+'bpm</span>';
      h+='</div>';
    }
    if(ult.dor!=null)h+='<div style="font-size:12px;margin-top:4px">Dor: <strong style="color:var(--red)">'+ult.dor+'/10</strong></div>';
  } else {
    h+='<div style="font-size:12px;color:var(--sl3)">Nenhuma evolução registrada</div>';
  }
  h+='</div>';

  // Última escala
  var escDin=(p.escalasDin||[]);
  if(escDin.length){
    var ultEsc=escDin.slice().sort(function(a,b){return b.dt.localeCompare(a.dt);})[0];
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">📊 Última escala</div>';
    h+='<div style="font-size:13px;font-weight:600">'+esc(ultEsc.nome)+'</div>';
    h+='<div style="display:flex;justify-content:space-between;margin-top:4px">';
    h+='<span style="font-size:12px;color:var(--sl3)">'+new Date(ultEsc.dt).toLocaleDateString('pt-BR')+'</span>';
    h+='<span style="font-size:16px;font-weight:800;color:var(--g1)">'+ultEsc.total+' pts</span>';
    h+='</div></div>';
  }
  // Escalas antigas (EVA)
  if(p.escalas&&p.escalas.eva!=null){
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:6px">🩺 Dor atual (EVA)</div>';
    var evaVal=p.escalas.eva;
    var evaCor=evaVal<=3?'var(--green)':evaVal<=6?'var(--amber)':'var(--red)';
    h+='<div style="font-size:32px;font-weight:900;color:'+evaCor+'">'+evaVal+'<span style="font-size:16px">/10</span></div>';
    h+='<div style="font-size:11px;color:var(--sl3)">'+(evaVal<=3?'Dor leve':evaVal<=6?'Dor moderada':'Dor intensa')+'</div>';
    if(p.escalas.dt)h+='<div style="font-size:11px;color:var(--sl3)">Registrado: '+new Date(p.escalas.dt).toLocaleDateString('pt-BR')+'</div>';
    h+='</div>';
  }

  // Pagamentos pendentes
  var pendVal=D.sessoes.filter(function(s){return s.pacienteId===p.id&&s.statusPag==='pendente'&&(s.valor||0)>0;}).reduce(function(a,s){return a+(s.valor||0);},0);
  h+='<div class="card" style="margin-bottom:10px;'+(pendVal>0?'border-color:#fcd34d;background:#fffbeb;':'')+'">';
  h+='<div style="font-size:11px;font-weight:800;color:'+(pendVal>0?'#92400e':'var(--g1)')+';text-transform:uppercase;margin-bottom:6px">💰 Pagamentos</div>';
  if(pendVal>0){
    h+='<div style="font-size:22px;font-weight:800;color:#d97706">R$'+pendVal.toFixed(2)+'</div>';
    h+='<div style="font-size:11px;color:#92400e">Pendente de recebimento</div>';
  } else {
    h+='<div style="font-size:12px;color:var(--green);font-weight:600">✅ Em dia</div>';
  }
  h+='</div>';

  return h;
}

  h+='</div>';

  if(!an.queixa&&!an.hma&&!an.doenças){
    h+='<div style="text-align:center;padding:40px">';
    h+='<div style="font-size:32px;margin-bottom:10px">📋</div>';
    h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">Anamnese não preenchida</div>';

  h+='<div class="card" style="margin-bottom:10px">';

    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:800;color:var(--g1);margin-bottom:8px;border-bottom:1px solid var(--borda);padding-bottom:6px">AVALIAÇÃO FISIOTERAPÊUTICA</div>';

      h+='<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:4px">Medicamentos</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:12px">';

  if(an.forca||an.adm||an.coordenação){
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:800;color:var(--g1);margin-bottom:8px;border-bottom:1px solid var(--borda);padding-bottom:6px">AVALIAÇÃO FÍSICA</div>';
    if(an.forca&&an.forca.length){
      h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:4px">Avaliação de Força</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="background:var(--g3)"><th style="padding:6px;text-align:left">Movimento</th><th style="padding:6px">Direita</th><th style="padding:6px">Esquerda</th></tr>';
      an.forca.forEach(function(f,i){h+='<tr style="background:'+(i%2===0?'var(--g4)':'#fff')+'"><td style="padding:6px">'+esc(f.mov||'')+'</td><td style="padding:6px;text-align:center">'+esc(f.dir||'')+'</td><td style="padding:6px;text-align:center">'+esc(f.esq||'')+'</td></tr>';});
      h+='</table></div>';
    }
    if(an.adm&&an.adm.length){
      h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:4px">Amplitude de Movimento</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="background:var(--g3)"><th style="padding:6px;text-align:left">Articulação</th><th style="padding:6px">Direita</th><th style="padding:6px">Esquerda</th></tr>';
      an.adm.forEach(function(f,i){h+='<tr style="background:'+(i%2===0?'var(--g4)':'#fff')+'"><td style="padding:6px">'+esc(f.art||'')+'</td><td style="padding:6px;text-align:center">'+esc(f.dir||'')+'</td><td style="padding:6px;text-align:center">'+esc(f.esq||'')+'</td></tr>';});
      h+='</table></div>';
    }
    if(an.coordenação){
      h+='<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:800;color:var(--g1);text-transform:uppercase;margin-bottom:4px">Coordenação Motora</div>';
      h+='<div style="font-size:12px">Dedo-nariz: <strong>'+esc(an.coordDN||'—')+'</strong></div>';
      h+='<div style="font-size:12px">Calcanhar-joelho: <strong>'+esc(an.coordCJ||'—')+'</strong></div></div>';
    }
    h+='</div>';
  }

  // Bloco 5 — Testes
  if(an.romberg||an.sentarLevantar||an.objTrat){
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:800;color:var(--g1);margin-bottom:8px;border-bottom:1px solid var(--borda);padding-bottom:6px">TESTES E OBJETIVOS</div>';
    if(an.romberg)h+='<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:var(--g1)">Romberg: </span><span style="font-size:12px">'+esc(an.romberg)+'</span></div>';
    if(an.sentarLevantar)h+='<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:var(--g1)">Sentar/Levantar: </span><span style="font-size:12px">'+esc(an.sentarLevantar)+' repetições</span></div>';
    h+=bloco('Objetivos do Tratamento',an.objTrat);
    h+='</div>';
  }

  if(an.dt)h+='<div style="font-size:11px;color:var(--sl3);text-align:right">Última atualização: '+new Date(an.dt).toLocaleDateString('pt-BR')+'</div>';
  return h;
}


function editarAnamnese(pid){
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  var an=p.anamnese||{};
  var meds=an.medicamentos||[{nome:'',obj:'',hora:''}];
  var exms=an.exames||[{nome:'',resultado:''}];
  var forca=an.forca||[{mov:'',dir:'',esq:''}];
  var adm=an.adm||[{art:'',dir:'',esq:''}];

  var dataAval=an.dataAvaliacao||hoje();
  var h='<div class="mh"><h3>Anamnese — '+esc(p.nome)+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<div class="fg"><label>Data da avaliação</label><input class="fi" type="date" id="an-data" value="'+esc(dataAval)+'"/></div>';

function toggleConsciente(sim){

function salvarAnamnese(){
  var pid=el('an-pid')?el('an-pid').value:'';
  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  // Coletar medicamentos
  var meds=[];
  document.querySelectorAll('.an-med-row').forEach(function(row){
    var n=(row.querySelectorAll('input')[0]||{}).value||'';
    var o=(row.querySelectorAll('input')[1]||{}).value||'';
    var hr=(row.querySelectorAll('input')[2]||{}).value||'';
    if(n.trim())meds.push({nome:n.trim(),obj:o,hora:hr});
  });
  // Coletar exames
  var exms=[];
  document.querySelectorAll('#an-exms-wrap > div').forEach(function(row){
    var n=(row.querySelectorAll('input')[0]||{}).value||'';
    var r=(row.querySelectorAll('input')[1]||{}).value||'';
    if(n.trim())exms.push({nome:n.trim(),resultado:r});
  });
  // Coletar força
  var forca=[];
  document.querySelectorAll('#an-forca-wrap > div').forEach(function(row){
    var inps=row.querySelectorAll('input');
    var fm=(inps[0]||{}).value||'';
    if(fm.trim())forca.push({mov:fm.trim(),dir:(inps[1]||{}).value||'',esq:(inps[2]||{}).value||''});
  });
  // Coletar ADM
  var adm=[];
  document.querySelectorAll('#an-adm-wrap > div').forEach(function(row){
    var inps=row.querySelectorAll('input');
    var am=(inps[0]||{}).value||'';
    if(am.trim())adm.push({art:am.trim(),dir:(inps[1]||{}).value||'',esq:(inps[2]||{}).value||''});
  });
  p.anamnese={
    consciente:el('an-cons-sim')?el('an-cons-sim').classList.contains('btn-p'):true,
    respNome:el('an-resp-nome')?el('an-resp-nome').value:'',
    respParentesco:el('an-resp-par')?el('an-resp-par').value:'',
    diagMedico:el('an-diagmedico')?el('an-diagmedico').value:'',
    queixa:el('an-queixa')?el('an-queixa').value:'',
    hma:el('an-hma')?el('an-hma').value:'',
    doenças:el('an-doenças')?el('an-doenças').value:'',
    histFamiliar:el('an-histfam')?el('an-histfam').value:'',
    rotina:el('an-rotina')?el('an-rotina').value:'',
    cirurgias:el('an-cirurgias')?el('an-cirurgias').value:'',
    objTrat:el('an-objtrat')?el('an-objtrat').value:'',
    medicamentos:meds,exames:exms,forca:forca,adm:adm,
    escalaDor:parseInt(el('an-edv')?el('an-edv').value:0)||0,
    localDor:el('an-ldor')?el('an-ldor').value:'',
    atividadeFisica:el('an-atfis')?el('an-atfis').value:'',
    fc:el('an-fc')?el('an-fc').value:'',sat:el('an-sat')?el('an-sat').value:'',
    pa:el('an-pa')?el('an-pa').value:'',fr:el('an-fr')?el('an-fr').value:'',
    inspecao:el('an-insp')?el('an-insp').value:'',
    coordDN:el('an-cdn')?el('an-cdn').value:'',
    coordCJ:el('an-ccj')?el('an-ccj').value:'',
    coordenação:!!(el('an-cdn')&&el('an-cdn').value||el('an-ccj')&&el('an-ccj').value),
    romberg:el('an-romberg')?el('an-romberg').value:'',
    sentarLevantar:el('an-sl')?parseInt(el('an-sl').value)||0:0,
    dt:new Date().toISOString(),
    dataAvaliacao:el('an-data')?el('an-data').value:hoje()
  };
  // Registrar no histórico de alterações
  registrarHistóricoAlteracao('Anamnese atualizada — '+p.nome);
  salvar();fecharM();PAC_ABA='anamnese';renderizar();toast('Anamnese salva!');
}


function registrarHistóricoAlteracao(descricao){
  try{
    var hist=JSON.parse(localStorage.getItem('fe_historico_alt')||'[]');
    var nome=FBU&&FBU.displayName?FBU.displayName:'Usuário';
    hist.unshift({dt:new Date().toISOString(),desc:descricao,usuario:nome});
    if(hist.length>200)hist=hist.slice(0,200);
    localStorage.setItem('fe_historico_alt',JSON.stringify(hist));
  }catch(e){}
}



function rAbaAvaliacoes(p){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h+='<div style="font-size:15px;font-weight:800">📊 Avaliações</div>';
  h+='<button class="btn btn-p btn-sm" onclick="abrirCatalogoEscalas(\''+p.id+'\')">+ Adicionar escala</button>';
  h+='</div>';

  var hist=p.escalasDin||[];
  if(!hist.length){
    h+='<div style="text-align:center;padding:40px">';
    h+='<div style="font-size:32px;margin-bottom:10px">📊</div>';
    h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">Nenhuma avaliação registrada</div>';
    h+='<div style="font-size:12px;color:var(--sl3);margin-bottom:16px">Adicione escalas clínicas para acompanhar a evolução</div>';
    h+='<button class="btn btn-p btn-sm" onclick="abrirCatalogoEscalas(\''+p.id+'\')">Adicionar primeira avaliação</button>';
    h+='</div>';
    return h;
  }

  // Agrupar por escala
  var grupos={};
  hist.forEach(function(r){
    if(!grupos[r.escId])grupos[r.escId]={nome:r.nome,cat:r.cat,registros:[]};
    grupos[r.escId].registros.push(r);
  });

  Object.keys(grupos).forEach(function(escId){
    var g=grupos[escId];
    g.registros.sort(function(a,b){return a.dt.localeCompare(b.dt);});
    h+='<div class="card" style="margin-bottom:12px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div><div style="font-size:13px;font-weight:800">'+esc(g.nome)+'</div>';
    h+='<div style="font-size:11px;color:var(--g1)">'+esc(g.cat)+'</div></div>';
    h+='<button class="btn btn-p btn-sm" data-eid="'+escId+'" data-pid="'+p.id+'" onclick="aplicarEscala(this.dataset.pid,this.dataset.eid)">+ Nova</button>';
    h+='</div>';

    // Gráfico de evolução se tiver 2+ registros
    if(g.registros.length>=2){
      var maxV=Math.max.apply(null,g.registros.map(function(r){return r.total;}));
      if(maxV>0){
        h+='<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--sl3);margin-bottom:4px">Evolução da pontuação</div>';
        h+='<div style="display:flex;align-items:flex-end;gap:4px;height:60px">';
        g.registros.forEach(function(r){
          var pct=Math.max(5,Math.round(r.total/maxV*100));
          var dt=new Date(r.dt);
          h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">';
          h+='<div style="font-size:9px;font-weight:700;color:var(--g1)">'+r.total+'</div>';
          h+='<div style="width:100%;background:var(--g1);border-radius:3px 3px 0 0;height:'+pct+'%"></div>';
          h+='<div style="font-size:8px;color:var(--sl3)">'+dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+'</div>';
          h+='</div>';
        });
        h+='</div></div>';
      }
    }

    // Lista de registros
    g.registros.slice().reverse().forEach(function(r){
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--borda)">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:12px;color:var(--sl3)">'+new Date(r.dt).toLocaleDateString('pt-BR')+' '+new Date(r.dt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>';
      if(r.obs)h+='<div style="font-size:11px;color:var(--sl3)">'+esc(r.obs)+'</div>';
      h+='</div>';
      h+='<div style="font-size:18px;font-weight:800;color:var(--g1)">'+r.total+'</div>';
      h+='<button class="btn btn-d btn-sm" data-pid="'+p.id+'" data-id="'+r.id+'" onclick="delEscalaDin(this.dataset.pid,this.dataset.id)">✕</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

  var pid=el('pt-pid')?el('pt-pid').value:'';

function confirmarRenovacao(pid){

  var obs=el('ren-obs')?el('ren-obs').value:'';

  var p=D.pacientes.find(function(x){return x.id===pid;});if(!p)return;
  // Salvar historico do pacote atual
  p.historicoPacotes=p.historicoPacotes||[];
  if(p.pacote){
    var pk=calcPacote(p);
    p.historicoPacotes.push({
      total:p.pacote,realizadas:pk?pk.realizadas:0,
      ini:p.pacoteIni,fim:new Date().toISOString().slice(0,10),
      valor:p.pacoteValor||0,obs:'Encerrado'
    });
  }
  // Novo pacote
  p.pacote=qtd;p.pacoteValor=val;p.pacoteIni=new Date().toISOString().slice(0,10);
  if(obs)p.pacoteObs=obs;
  registrarHistóricoAlteracao('Pacote renovado — '+p.nome+' ('+qtd+' sessoes)');
  salvar();fecharM();renderizar();toast('Pacote renovado!');
}

function resumoDia(ds){
  var sessDia=D.sessoes.filter(function(s){return s.data===ds;});
  var realizadas=sessDia.filter(function(s){return s.status==='realizado';}).length;
  var faltas=sessDia.filter(function(s){return s.status==='falta';}).length;
  var pendentes=sessDia.filter(function(s){return s.status==='agendado'||s.status==='confirmado';}).length;
  var valPrev=sessDia.reduce(function(a,s){return a+(s.valor||0);},0);
  var valRec=sessDia.filter(function(s){return s.statusPag==='pago';}).reduce(function(a,s){return a+(s.valor||0);},0);
  var dt=new Date(ds+'T12:00:00');
  var h='<div class="mh"><h3>'+dt.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
