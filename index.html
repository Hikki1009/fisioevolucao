  h+='<div style="text-align:center;padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:22px;font-weight:800;color:var(--g1)">'+sessDia.length+'</div><div style="font-size:11px;color:var(--sl3)">Total</div></div>';
  h+='<div style="text-align:center;padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:22px;font-weight:800;color:#16a34a">'+realizadas+'</div><div style="font-size:11px;color:var(--sl3)">Realizados</div></div>';
  h+='<div style="text-align:center;padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:22px;font-weight:800;color:#dc2626">'+faltas+'</div><div style="font-size:11px;color:var(--sl3)">Faltas</div></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h+='<div style="padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:12px;color:var(--sl3)">Valor previsto</div><div style="font-size:18px;font-weight:800;color:var(--g1)">R$'+valPrev.toFixed(2)+'</div></div>';
  h+='<div style="padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:12px;color:var(--sl3)">Valor recebido</div><div style="font-size:18px;font-weight:800;color:#16a34a">R$'+valRec.toFixed(2)+'</div></div>';
  h+='</div>';
  if(pendentes>0)h+='<div style="padding:8px;background:#fffbeb;border-radius:8px;font-size:13px;color:#d97706;font-weight:600">⏳ '+pendentes+' ainda não confirmada(s)</div>';
  abrirM(h);
}

function togglePgDia(){
  var sel=el('mpl-pgmes');var wrap=el('mpl-dia-wrap');var lbl=el('mpl-dia-lbl');var perWrap=el('mpl-per-wrap');
  if(!sel||!wrap)return;
  if(sel.value==='personalizado'){
    wrap.style.display='none';
    if(perWrap)perWrap.style.display='block';
  } else if(sel.value==='mensal'){
    wrap.style.display='none';
    if(perWrap)perWrap.style.display='none';
  } else {
    if(perWrap)perWrap.style.display='none';
    wrap.style.display='block';
    if(sel.value==='dias')lbl.textContent='Quantidade de dias';
    else lbl.textContent='Dia do mês';
  }
}

// ── Repetição de agenda no início do mês ─────────────────────────
function verificarInicioMes(){
  var hj=hoje();
  var diaAtual=new Date(hj+'T12:00:00').getDate();
  if(diaAtual>5)return; // só nos primeiros 5 dias do mês
  var chave='fe_agenda_mes_'+hj.slice(0,7);
  if(localStorage.getItem(chave))return; // já perguntou este mês
  localStorage.setItem(chave,'1');
  // Verificar se há sessões no mês anterior
  var mesAnt=new Date();mesAnt.setDate(1);mesAnt.setMonth(mesAnt.getMonth()-1);
  var mesAntStr=fmtISO(mesAnt).slice(0,7);
  var sessMesAnt=D.sessoes.filter(function(s){return s.data&&s.data.slice(0,7)===mesAntStr;});
  if(!sessMesAnt.length)return;
  // Agrupar por paciente+hora+tipo
  var agenda={};
  sessMesAnt.forEach(function(s){
    if(!s.pacienteId)return;
    var k=s.pacienteId+'|'+s.hora+'|'+s.tipoId+'|'+s.planoId;
    if(!agenda[k])agenda[k]={pacienteId:s.pacienteId,hora:s.hora,tipoId:s.tipoId,planoId:s.planoId,valor:s.valor,obs:s.obs||''};
  });
  var pacs=Object.values(agenda);
  if(!pacs.length)return;
  setTimeout(function(){mostrarModalInicioMes(pacs);},1200);
}

function mostrarModalInicioMes(pacs){
  var mesAtual=new Date();
  var nomeMes=mesAtual.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  var h='<div class="mh"><h3>📅 Novo mês — '+nomeMes+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<p style="font-size:13px;color:var(--sl2);margin-bottom:14px">Deseja repetir a agenda do mês passado? Informe quantas sessões agendar para cada paciente.</p>';
  h+='<div id="agenda-mes-lista">';
  pacs.forEach(function(p,i){
    var nm=nomePac(p.pacienteId);if(!nm)return;
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--borda)">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(nm)+'</div><div style="font-size:11px;color:var(--sl3)">'+esc(p.hora)+' · '+esc(tpNome(p.tipoId))+'</div></div>';
    h+='<input type="number" class="fi agm-qtd" min="0" max="30" value="4" data-idx="'+i+'" style="width:64px;text-align:center" placeholder="Qtd"/>';
    h+='</div>';
  });
  h+='</div>';
  h+='<input type="hidden" id="agm-pacs" value="'+esc(JSON.stringify(pacs))+'"/>';
  h+='<div style="display:flex;gap:8px;margin-top:16px">';
  h+='<button class="btn btn-p" style="flex:1" onclick="confirmarAgendaMes()">✅ Agendar</button>';
  h+='<button class="btn btn-s" style="flex:1" onclick="fecharM()">Não, obrigado</button>';
  h+='</div>';
  abrirM(h);
}

function confirmarAgendaMes(){
  var pacsRaw=el('agm-pacs')?el('agm-pacs').value:'';
  if(!pacsRaw)return;
  var pacs=JSON.parse(pacsRaw);
  var qtds=document.querySelectorAll('.agm-qtd');
  var mesAtual=new Date();
  var ano=mesAtual.getFullYear();var mes=mesAtual.getMonth();
  var criadas=0;
  qtds.forEach(function(inp,i){
    var qtd=parseInt(inp.value)||0;
    if(!qtd||!pacs[i])return;
    for(var s=0;s<qtd;s++){
      var d=new Date(ano,mes,s*7+1);
      if(d.getMonth()!==mes)break;
      var ds=fmtISO(d);
      D.sessoes.push({id:uid(),pacienteId:pacs[i].pacienteId,data:ds,hora:pacs[i].hora,tipoId:pacs[i].tipoId||'',planoId:pacs[i].planoId||'',valor:pacs[i].valor||0,statusPag:'pendente',status:'agendado',obs:pacs[i].obs||''});
      criadas++;
    }
  });
  salvar();fecharM();renderizar();
  toast(criadas?criadas+' sessões agendadas para este mês!':'Nenhuma sessão agendada.');
}


// ── Sistema de Notificações (Sino) ───────────────────────────────
var _sinoAberto=false;

function toggleSino(){
  _sinoAberto=!_sinoAberto;
  var p=el('sino-painel');
  if(p)p.style.display=_sinoAberto?'block':'none';
  if(_sinoAberto)renderSino();
}

function fecharSino(){
  _sinoAberto=false;
  var p=el('sino-painel');if(p)p.style.display='none';
}

function getNotifs(){
  try{return JSON.parse(localStorage.getItem('fe_notifs')||'[]');}catch(e){return[];}
}

function saveNotifs(notifs){
  try{localStorage.setItem('fe_notifs',JSON.stringify(notifs));}catch(e){}
}

function addNotif(id,tipo,msg,extra){
  var notifs=getNotifs();
  // Evitar duplicata por ID
  if(notifs.find(function(n){return n.id===id;}))return;
  notifs.unshift({id:id,tipo:tipo,msg:msg,extra:extra||'',ts:Date.now(),lida:false});
  if(notifs.length>50)notifs=notifs.slice(0,50);
  saveNotifs(notifs);
  atualizarBadgeSino();
}

function delNotif(id){
  var notifs=getNotifs().filter(function(n){return n.id!==id;});
  saveNotifs(notifs);
  renderSino();atualizarBadgeSino();
}

function limparTodasNotif(){
  saveNotifs([]);renderSino();atualizarBadgeSino();
}

function atualizarBadgeSino(){
  var badge=el('sino-badge');if(!badge)return;
  var n=getNotifs().filter(function(n){return!n.lida;}).length;
  badge.style.display=n>0?'flex':'none';
  badge.textContent=n>9?'9+':String(n);
}

function renderSino(){
  var lista=el('sino-lista');if(!lista)return;
  var notifs=getNotifs();
  // Limpar notifs com mais de 7 dias (exceto pagamentos)
  var agora=Date.now();
  notifs=notifs.filter(function(n){
    if(n.tipo==='pag')return true; // pagamentos só somem quando marcado
    return(agora-n.ts)<7*24*60*60*1000;
  });
  saveNotifs(notifs);
  if(!notifs.length){lista.innerHTML='<div style="text-align:center;padding:30px;color:var(--sl3);font-size:13px">Nenhuma notificação</div>';return;}
  var h='';
  var icons={evo:'📝',pag:'💰',agenda:'📅',crefito:'🔴'};
  notifs.forEach(function(n){
    h+='<div style="display:flex;gap:10px;padding:10px;border-bottom:1px solid var(--borda);align-items:flex-start;background:'+(n.lida?'transparent':'var(--g4)')+';border-radius:8px;margin-bottom:4px">';
    h+='<div style="font-size:20px;flex-shrink:0">'+(icons[n.tipo]||'🔔')+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(n.msg)+'</div>';
    if(n.extra)h+='<div style="font-size:11px;color:var(--sl3);margin-top:2px">'+esc(n.extra)+'</div>';
    h+='<div style="font-size:10px;color:var(--sl3);margin-top:3px">'+new Date(n.ts).toLocaleDateString('pt-BR')+' '+new Date(n.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div></div>';
    if(n.tipo==='pag'){
      h+='<button class="btn btn-p btn-sm" style="flex-shrink:0;font-size:11px" data-nid="'+n.id+'" onclick="marcarPagoNotif(this.dataset.nid)">Pago</button>';
    }
    if(n.tipo==='crefito'){
      h+='<button class="btn btn-d btn-sm" style="flex-shrink:0;font-size:11px" onclick="fecharSino();editarNome()">Preencher</button>';
    }
    h+='<button style="background:none;border:none;color:var(--sl3);cursor:pointer;font-size:16px;flex-shrink:0;padding:0 4px" data-nid="'+n.id+'" onclick="delNotif(this.dataset.nid)">✕</button>';
    h+='</div>';
  });
  lista.innerHTML=h;
  // Marcar todas como lidas ao abrir
  notifs.forEach(function(n){n.lida=true;});
  saveNotifs(notifs);
  atualizarBadgeSino();
}

function gerarNotificacoes(){
  var hj=hoje();
  var agora=Date.now();

  // 0. CREFITO não preenchido
  if(!D.cfg.crefito||!D.cfg.crefito.trim()){
    addNotif('crefito_pendente','crefito',
      '🔴 Complete seu perfil profissional',
      'CREFITO não preenchido. Obrigatório pela Lei nº 6.316/1975. Toque para preencher.');
  }

  // 1. Evoluções pendentes
  D.pacientes.forEach(function(p){
    var sessRealizadas=D.sessoes.filter(function(s){return s.pacienteId===p.id&&s.status==='realizado'&&s.data<=hj;});
    var evos=(p.evolucoes||[]).length;
    var pendentes=sessRealizadas.length-evos;
    if(pendentes>0){
      // Pegar datas dos atendimentos sem evolução
      var datas=sessRealizadas.slice(evos).map(function(s){return fmtD(s.data);});
      var dtLabel=datas.length===1?datas[0]:datas.slice(0,2).join(', ')+(datas.length>2?' e mais '+(datas.length-2):'');
      addNotif('evo_'+p.id,'evo',
        'Evolução pendente — '+esc(p.nome),
        ''+pendentes+' sessão(ões) sem evolução: '+dtLabel+'. Faça a evolução para se manter em dia.');
    }
  });

  // 2. Pagamentos — notificar apenas no dia configurado do plano
  var chaveUlt='fe_notif_pag_ult';
  var ultPag=parseInt(localStorage.getItem(chaveUlt)||'0');
  var diasDesdeUlt=Math.floor((agora-ultPag)/(24*60*60*1000));
  if(diasDesdeUlt>=2||ultPag===0){
    localStorage.setItem(chaveUlt,String(agora));
    // Agrupar sessões pendentes por plano e mês
    var gruposPag={};
    D.sessoes.filter(function(s){
      return(s.statusPag==='pendente'||s.statusPag==='parcial')&&s.status==='realizado'&&(s.valor||0)>0;
    }).forEach(function(s){
      var pl=D.planos.find(function(x){return x.id===s.planoId;});
      if(!pl)return;
      var dSess=new Date(s.data+'T12:00:00');
      var mesRef=fmtISO(dSess).slice(0,7);
      var chave=pl.id+'|'+mesRef;
      if(!gruposPag[chave])gruposPag[chave]={pl:pl,mesRef:mesRef,sessoes:[],total:0};
      gruposPag[chave].sessoes.push(s);
      gruposPag[chave].total+=(s.valor||0);
    });
    // Verificar se chegou o dia de notificar cada grupo
    Object.values(gruposPag).forEach(function(g){
      var pl=g.pl;
      var mesAno=g.mesRef.split('-');
      var anoRef=parseInt(mesAno[0]);var mesIdx=parseInt(mesAno[1])-1;
      // Calcular data prevista de pagamento
      var dtBase=new Date(anoRef,mesIdx,pl.pgDia||30);
      if(pl.pgMes==='seguinte'){dtBase=new Date(anoRef,mesIdx+1,pl.pgDia||30);}
      else if(pl.pgMes==='dias'){dtBase=new Date(anoRef,mesIdx,1);dtBase.setDate(dtBase.getDate()+(pl.pgDia||30));}
      var dtPrevStr=fmtISO(dtBase);
      var alerta=pl.pgAlerta||3;
      var diasAteVenc=Math.ceil((dtBase-new Date(hj+'T12:00:00'))/(864e5));
      // Só notifica se chegou no dia ou está dentro do período de alerta ou já venceu
      if(diasAteVenc>alerta)return;
      var nPacs=pl.mesmoPagador?'Todos os pacientes':g.sessoes.length+' sessão(ões)';
      var status=diasAteVenc<0?'Vencido há '+(Math.abs(diasAteVenc))+' dia(s)':diasAteVenc===0?'Vence hoje':'Vence em '+diasAteVenc+' dia(s)';
      var msg=pl.nome+' — '+g.mesRef.split('-').reverse().join('/')+': R$'+g.total.toFixed(2);
      var extra=status+' · '+nPacs+(pl.mesmoPagador?' (mesmo pagador)':'');
      addNotif('pag_'+pl.id+'_'+g.mesRef,'pag',msg,extra);
    });
  }

  // 3. Início do mês - atualização de agenda
  var diaAtual=new Date(hj+'T12:00:00').getDate();
  if(diaAtual<=5){
    var chaveAgenda='fe_notif_agenda_'+hj.slice(0,7);
    if(!localStorage.getItem(chaveAgenda)){
      localStorage.setItem(chaveAgenda,'1');
      addNotif('agenda_'+hj.slice(0,7),'agenda',
        'Atualização de agenda recomendada!',
        'Deseja repetir a agenda do mês anterior? Acesse o app e confirme.');
    }
  }

  atualizarBadgeSino();
}


// ── Proteção de dados ────────────────────────────────────────────
var _dadosSujos = false;

function salvarHistórico(){
  try{
    var hist = JSON.parse(localStorage.getItem('fe_historico')||'[]');
    var snapshot = {
      ts: Date.now(),
      data: JSON.stringify({pacientes:D.pacientes,sessoes:D.sessoes,feriados:D.feriados,planos:D.planos,tipos:D.tipos})
    };
    hist.unshift(snapshot);
    if(hist.length > 3) hist = hist.slice(0,3);
    localStorage.setItem('fe_historico', JSON.stringify(hist));
  }catch(e){}
}

function restaurarHistórico(){
  try{
    var hist = JSON.parse(localStorage.getItem('fe_historico')||'[]');
    if(!hist.length){ toast('Nenhum histórico disponível'); return; }
    var h='<div class="mh"><h3>Restaurar versão anterior</h3><button class="mc" onclick="fecharM()">✕</button></div>';
    h+='<p style="font-size:12px;color:var(--sl3);margin-bottom:14px">Escolha uma versão para restaurar. Os dados atuais serão substituídos.</p>';
    hist.forEach(function(v,i){
      var d = new Date(v.ts);
      var dados = JSON.parse(v.data);
      h+='<div class="card" style="margin-bottom:8px;cursor:pointer">';
      h+='<div style="font-size:13px;font-weight:700">Versão '+(i+1)+' — '+d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>';
      h+='<div style="font-size:12px;color:var(--sl3);margin-top:3px">'+dados.pacientes.length+' pacientes · '+dados.sessoes.length+' sessões</div>';
      h+='<button class="btn btn-p btn-sm" style="margin-top:8px" data-idx="'+i+'" onclick="confirmarRestore(this.dataset.idx)">Restaurar esta versão</button>';
      h+='</div>';
    });
    abrirM(h);
  }catch(e){ toast('Erro ao carregar histórico'); }
}

function confirmarRestore(idx){
  if(!confirm('Restaurar esta versão? Os dados atuais serão substituídos.')) return;
  try{
    var hist = JSON.parse(localStorage.getItem('fe_historico')||'[]');
    var dados = JSON.parse(hist[parseInt(idx)].data);
    if(dados.pacientes) D.pacientes=dados.pacientes;
    if(dados.sessoes) D.sessoes=dados.sessoes;
    if(dados.feriados) D.feriados=dados.feriados;
    if(dados.planos) D.planos=dados.planos;
    if(dados.tipos) D.tipos=dados.tipos;
    salvar(); fecharM(); ir('inicio'); toast('Versão restaurada com sucesso!');
  }catch(e){ toast('Erro ao restaurar'); }
}

function backupAutomatico(){
  try{
    var d={pacientes:D.pacientes,sessoes:D.sessoes,feriados:D.feriados,planos:D.planos,tipos:D.tipos,cfg:D.cfg,notas:D.notas,ts:Date.now()};
    localStorage.setItem('fe_bkp_silencioso',JSON.stringify(d));
    var ul=parseInt(localStorage.getItem('fe_lembrete_bkp')||'0');
    if(Date.now()-ul>7*24*60*60*1000){
      localStorage.setItem('fe_lembrete_bkp',String(Date.now()));
      setTimeout(function(){toast('💾 Lembre-se de fazer backup! Vá em Mais → Exportar JSON.',5000);},3000);
    }
  }catch(e){}
}

function calcPascoa(ano){
  var a=ano%19,b=Math.floor(ano/100),c=ano%100;
  var d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  var i2=Math.floor(c/4),k=c%4,l=(32+2*e+2*i2-h-k)%7;
  var m=Math.floor((a+11*h+22*l)/451);
  var mes=Math.floor((h+l-7*m+114)/31);
  var dia=(h+l-7*m+114)%31+1;
  return new Date(ano,mes-1,dia);
}
function getFeriadosAno(ano){
  var fixos=[
    {d:'01-01',n:'Ano Novo'},{d:'04-21',n:'Tiradentes'},
    {d:'05-01',n:'Dia do Trabalho'},{d:'09-07',n:'Independência do Brasil'},
    {d:'10-12',n:'Nossa Senhora Aparecida'},{d:'11-02',n:'Finados'},
    {d:'11-15',n:'Proclamação da República'},{d:'11-20',n:'Consciência Negra'},
    {d:'12-25',n:'Natal'}
  ];
  var result=fixos.map(function(f){return{data:ano+'-'+f.d,nome:f.n,nacional:true};});
  var pascoa=calcPascoa(ano);
  function ad(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
  function fmt(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
  result.push({data:fmt(ad(pascoa,-48)),nome:'Segunda de Carnaval',nacional:true});
  result.push({data:fmt(ad(pascoa,-47)),nome:'Terça de Carnaval',nacional:true});
  result.push({data:fmt(ad(pascoa,-2)),nome:'Sexta-feira Santa',nacional:true});
  result.push({data:fmt(pascoa),nome:'Páscoa',nacional:true});
  result.push({data:fmt(ad(pascoa,60)),nome:'Corpus Christi',nacional:true});
  return result;
}
function iniciarFeriadosNacionais(){
  var ano=new Date().getFullYear();
  // Remover feriados nacionais antigos e recriar com formato correto AAAA-MM-DD
  D.feriados=D.feriados.filter(function(f){return!f.nacional;});
  var nacionais=getFeriadosAno(ano).concat(getFeriadosAno(ano+1));
  nacionais.forEach(function(f){
    D.feriados.push({id:'nac_'+f.data,data:f.data,nome:f.nome,nacional:true});
  });
}
