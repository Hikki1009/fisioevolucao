  DP.turmas.forEach(function(t){
    h+='<button class="btn btn-sm '+(window._filtroTurmaPil===t.id?'btn-p':'btn-s')+'" data-tid="'+esc(t.id)+'" onclick="setFiltroTurmaPil(this.dataset.tid)">'+esc(t.nome)+'</button>';
  });
  h+='</div>';
  // Grade
  h+='<div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px);padding-bottom:60px">';
  h+='<div style="display:grid;grid-template-columns:40px repeat(7,1fr);min-width:460px">';
  // Cabeçalhos
  h+='<div style="background:var(--g1);color:#fff;padding:5px;font-size:10px;font-weight:700">Hr</div>';
  semana.forEach(function(d){
    var ds=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    var isHj=ds===hj;
    // Resumo do dia
    var aulasDia=DP.aulas.filter(function(a){return a.data===ds;});
    var presTotal=0,faltaTotal=0;
    aulasDia.forEach(function(a){(a.presencas||[]).forEach(function(p){if(p.status==='presente')presTotal++;else if(p.status==='falta')faltaTotal++;});});
    h+='<div style="background:'+(isHj?'var(--g1)':'var(--g2)')+';color:#fff;padding:5px;font-size:10px;font-weight:700;text-align:center;cursor:pointer" onclick="resumoDiaPil(\''+ds+'\')">'+dNms[d.getDay()]+'<br><strong>'+d.getDate()+'</strong>';
    if(presTotal>0||faltaTotal>0)h+='<br><span style="font-size:8px">✅'+presTotal+' ❌'+faltaTotal+'</span>';
    h+='</div>';
  });
  // Horários
  var horas=[];for(var hh=6;hh<=22;hh++)horas.push((hh<10?'0':'')+hh+':00');
  horas.forEach(function(hora){
    h+='<div style="background:var(--g4);border:1px solid var(--borda);padding:3px;font-size:9px;color:var(--sl3)">'+hora+'</div>';
    semana.forEach(function(d){
      var ds=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
      var dow=d.getDay();
      var turmasSlot=DP.turmas.filter(function(t){
        if(window._filtroTurmaPil&&t.id!==window._filtroTurmaPil)return false;
        return(t.dias||[]).includes(dow)&&t.horario===hora;
      });
      // Conflito com fisio
      var conflitoFisio=D.sessoes.some(function(s){return s.data===ds&&s.hora===hora;});
      h+='<div style="background:#fff;border:1px solid var(--borda);padding:2px;min-height:32px">';
      if(conflitoFisio&&turmasSlot.length===0)h+='<div style="font-size:8px;color:#d97706;padding:2px">⚠️ Fisio</div>';
      turmasSlot.forEach(function(t){
        var nA=DP.alunos.filter(function(a){return!a.inativo&&(a.turmas||[]).includes(t.id);}).length;
        var cap=t.capacidade||6;var lotado=nA>=cap;
        var aula=DP.aulas.find(function(a){return a.turmaId===t.id&&a.data===ds&&a.hora===hora;});
        var presentes=aula?(aula.presencas||[]).filter(function(p){return p.status==='presente';}).length:0;
        var faltas=aula?(aula.presencas||[]).filter(function(p){return p.status==='falta';}).length:0;
        var temEvoP=aula&&aula.obs&&aula.obs.length>0;
        // Cor por status da aula
        var corAula=aula&&presentes>0?'#dcfce7':lotado?'#fee2e2':'#f3e8ff';
        var corBorda=aula&&presentes>0?'#16a34a':lotado?'#dc2626':'#7c3aed';
        h+='<div style="position:relative;background:'+corAula+';border-left:3px solid '+corBorda+';border-radius:3px;padding:2px 4px;font-size:8px;margin-bottom:2px;cursor:pointer" onclick="abrirTurmaAula(\''+t.id+'\',\''+ds+'\',\''+hora+'\')">';
        h+=esc(t.nome.slice(0,10))+'<br>';
        h+=nA+'/'+cap+(lotado?' 🔴':'');
        if(aula)h+=' ✅'+presentes+(faltas>0?' ❌'+faltas:'');
        if(!temEvoP&&presentes>0)h+='<span style="position:absolute;top:1px;right:1px;width:5px;height:5px;background:#ef4444;border-radius:50%"></span>';
        if(conflitoFisio)h+='<br><span style="color:#d97706">⚠️</span>';
        h+='</div>';
      });
      h+='</div>';
    });
  });
  h+='</div></div>';
  // Legenda
  h+='<div style="display:flex;gap:12px;margin-top:8px;font-size:11px;flex-wrap:wrap">';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#dcfce7;border-left:3px solid #16a34a;display:inline-block"></span>Com presença</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#f3e8ff;border-left:3px solid #7c3aed;display:inline-block"></span>Agendado</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#fee2e2;border-left:3px solid #dc2626;display:inline-block"></span>Lotado</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:5px;height:5px;background:#ef4444;border-radius:50%;display:inline-block"></span>Evolução pendente</span>';
  h+='</div>';
  el2.innerHTML=h;
}
function setFiltroTurmaPil(tid){window._filtroTurmaPil=tid;irPil('agenda_pil');}
function resumoDiaPil(ds){
  var turmasDow=DP.turmas.filter(function(t){return(t.dias||[]).includes(new Date(ds+'T12:00:00').getDay());});
  var aulasDia=DP.aulas.filter(function(a){return a.data===ds;});
  var presTotal=0,faltaTotal=0,repTotal=0;
  aulasDia.forEach(function(a){(a.presencas||[]).forEach(function(p){
    if(p.status==='presente')presTotal++;
    else if(p.status==='falta')faltaTotal++;
    else if(p.status==='reposicao')repTotal++;
  });});
  var dt=new Date(ds+'T12:00:00');
  var h='<div class="mh"><h3>'+dt.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
  h+='<div style="text-align:center;padding:10px;background:var(--g4);border-radius:8px"><div style="font-size:20px;font-weight:800;color:var(--g1)">'+turmasDow.length+'</div><div style="font-size:11px;color:var(--sl3)">Turmas</div></div>';
  h+='<div style="text-align:center;padding:10px;background:#dcfce7;border-radius:8px"><div style="font-size:20px;font-weight:800;color:#16a34a">'+presTotal+'</div><div style="font-size:11px;color:var(--sl3)">Presenças</div></div>';
  h+='<div style="text-align:center;padding:10px;background:#fee2e2;border-radius:8px"><div style="font-size:20px;font-weight:800;color:#dc2626">'+faltaTotal+'</div><div style="font-size:11px;color:var(--sl3)">Faltas</div></div>';
  h+='</div>';
  if(repTotal>0)h+='<div style="padding:8px;background:#fffbeb;border-radius:8px;font-size:13px;color:#d97706;font-weight:600;margin-bottom:10px">🔄 '+repTotal+' reposição(ões)</div>';
  turmasDow.forEach(function(t){
    var nA=DP.alunos.filter(function(a){return!a.inativo&&(a.turmas||[]).includes(t.id);}).length;
    var aula=DP.aulas.find(function(a){return a.turmaId===t.id&&a.data===ds;});
    var pres=aula?(aula.presencas||[]).filter(function(p){return p.status==='presente';}).length:0;
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--borda)">';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:700">'+esc(t.nome)+'</div>';
    h+='<div style="font-size:11px;color:var(--sl3)">'+esc(t.horario||'')+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:'+(pres>0?'#16a34a':'var(--sl3)')+'">'+pres+'/'+nA+'</div>';
    h+='<div style="font-size:10px;color:var(--sl3)">presentes</div></div>';
    h+='</div>';
  });
  abrirM(h);
}

function abrirTurmaAula(turmaId,ds,hora){
  var t=DP.turmas.find(function(x){return x.id===turmaId;});if(!t)return;
  var alunosTurma=DP.alunos.filter(function(a){return!a.inativo&&(a.turmas||[]).includes(turmaId);});
  // Ver aula existente
  var aula=DP.aulas.find(function(a){return a.turmaId===turmaId&&a.data===ds&&a.hora===hora;});
  if(!aula){aula={id:uid(),turmaId:turmaId,data:ds,hora:hora,presencas:[],obs:''};}
  var h='<div class="mh"><h3>'+esc(t.nome)+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<div style="font-size:12px;color:var(--sl3);margin-bottom:12px">'+fmtD(ds)+' às '+hora+'</div>';
  h+='<div style="font-size:13px;font-weight:700;margin-bottom:8px">Presença</div>';
  alunosTurma.forEach(function(a){
    var pres=aula.presencas.find(function(p){return p.alunoId===a.id;})||{status:'',valor:0};
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--borda)">';
    h+='<div style="flex:1;font-size:13px;font-weight:600">'+esc(a.nome)+'</div>';
    ['presente','falta','reposicao'].forEach(function(st){
      var label={presente:'✅',falta:'❌',reposicao:'🔄'}[st];
      h+='<button class="btn btn-sm '+(pres.status===st?'btn-p':'btn-s')+'" style="padding:4px 8px" data-aid="'+esc(a.id)+'" data-aulaid="'+esc(aula.id)+'" data-turmaid="'+esc(turmaId)+'" data-ds="'+ds+'" data-hora="'+hora+'" data-st="'+st+'" onclick="marcarPresenca(this)">'+label+'</button>';
    });
    h+='</div>';
  });
  h+='<div class="fg" style="margin-top:12px"><label>Observações da aula</label>';
  h+='<textarea class="fi" id="aula-obs" rows="2">'+esc(aula.obs||'')+'</textarea></div>';
  h+='<button class="btn btn-p btn-bl" data-turmaid="'+turmaId+'" data-ds="'+ds+'" data-hora="'+hora+'" onclick="salvarAula(this.dataset.turmaid,this.dataset.ds,this.dataset.hora)">Salvar aula</button>';
  h+='<div style="display:flex;gap:8px;margin-top:8px">';
  h+='<button class="btn btn-a btn-sm" style="flex:1" data-turmaid="'+turmaId+'" data-ds="'+ds+'" data-hora="'+hora+'" onclick="fecharM();evoluirAula(this.dataset.turmaid,this.dataset.ds,this.dataset.hora)">📝 Evolução</button>';
  h+='<button class="btn btn-s btn-sm" style="flex:1" data-turmaid="'+turmaId+'" onclick="fecharM();buscarEvolucoesPil(this.dataset.turmaid,\'\')">📋 Ver evoluções</button>';
  h+='</div>';
  abrirM(h);
}

function marcarPresenca(btn){
  var aid=btn.dataset.aid;var ds=btn.dataset.ds;var hora=btn.dataset.hora;
  var turmaId=btn.dataset.turmaid;var st=btn.dataset.st;
  var aula=DP.aulas.find(function(a){return a.turmaId===turmaId&&a.data===ds&&a.hora===hora;});
  if(!aula){aula={id:uid(),turmaId:turmaId,data:ds,hora:hora,presencas:[],obs:''};DP.aulas.push(aula);}
  var pres=aula.presencas.find(function(p){return p.alunoId===aid;});
  if(!pres){pres={alunoId:aid,status:'',valor:0};aula.presencas.push(pres);}
  pres.status=st;
  // Valor do plano do aluno
  var aluno=DP.alunos.find(function(x){return x.id===aid;});
  if(aluno&&aluno.valorAula)pres.valor=aluno.valorAula;
  salvarPilates();
  // Atualizar visual do botão
  btn.parentElement.querySelectorAll('.btn').forEach(function(b){b.className=b.className.replace('btn-p','btn-s');});
  btn.className=btn.className.replace('btn-s','btn-p');
}

function salvarAula(turmaId,ds,hora){
  var aula=DP.aulas.find(function(a){return a.turmaId===turmaId&&a.data===ds&&a.hora===hora;});
  if(!aula){aula={id:uid(),turmaId:turmaId,data:ds,hora:hora,presencas:[],obs:''};DP.aulas.push(aula);}
  var obs=el('aula-obs');if(obs)aula.obs=obs.value;
  salvarPilates();fecharM();toast('Aula salva!');
}

  });

  h+='<div class="fg"><label>Valor padrão por aula (R$)</label><input class="fi" type="number" id="tp-val" min="0" step="0.01" value="'+(t.valor||0)+'"/></div>';

function verificarConflitoHorario(dias,hora,excludeTid){
  // Verificar conflito com fisioterapia
  var conflitos=[];
  D.sessoes.forEach(function(s){
    var d=new Date(s.data+'T12:00:00');
    var dow=d.getDay();
    if(dias.includes(dow)&&s.hora===hora)
      conflitos.push(nomePac(s.pacienteId)+' ('+fmtD(s.data)+')');
  });
  // Verificar conflito com outras turmas Pilates
  DP.turmas.forEach(function(t){
    if(t.id===excludeTid)return;
    if(t.horario===hora&&(t.dias||[]).some(function(d){return dias.includes(d);}))
      conflitos.push('Turma Pilates: '+t.nome);
  });
  return conflitos;
}
function salvarTurmaPilates(){
  var tid=el('tp-id')?el('tp-id').value:'';
  var nome=el('tp-nome')?el('tp-nome').value.trim():'';
  if(!nome){toast('Nome obrigatório');return;}
  var dias=[];document.querySelectorAll('.tp-dia:checked').forEach(function(c){dias.push(parseInt(c.value));});
  var hora=(el('tp-hora')?el('tp-hora').value:'08:00');
  if(hora.length===5)hora+=':00';
  // Verificar conflitos
  var conflitos=verificarConflitoHorario(dias,hora,tid);
  if(conflitos.length>0){
    if(!confirm('⚠️ Conflito de horário detectado:\n'+conflitos.slice(0,3).join('\n')+'\n\nDeseja salvar mesmo assim?'))return;
  }
  var t={id:tid||uid(),nome:nome,nivel:el('tp-nivel')?el('tp-nivel').value:'Iniciante',
    dias:dias,horario:hora,capacidade:parseInt(el('tp-cap')?el('tp-cap').value:6)||6,
    valor:parseFloat(el('tp-val')?el('tp-val').value:0)||0};
  if(tid){var idx=DP.turmas.findIndex(function(x){return x.id===tid;});if(idx>-1)DP.turmas[idx]=t;else DP.turmas.push(t);}
  else DP.turmas.push(t);
  salvarPilates();fecharM();irPil('turmas_pil');toast('Turma salva!');
}
function delTurmaPilates(tid){
  if(!confirm('Excluir esta turma?'))return;
  DP.turmas=DP.turmas.filter(function(t){return t.id!==tid;});
  salvarPilates();irPil('turmas_pil');toast('Turma excluída!');
}
function verAlunosTurma(tid){
  var t=DP.turmas.find(function(x){return x.id===tid;});if(!t)return;
  var alunos=DP.alunos.filter(function(a){return!a.inativo&&(a.turmas||[]).includes(tid);});
  var espera=DP.alunos.filter(function(a){return(a.listaEspera||[]).includes(tid);});
  var cap=t.capacidade||6;var vg=Math.max(0,cap-alunos.length);
  var h='<div class="mh"><h3>'+esc(t.nome)+'</h3><button class="mc" onclick="fecharM()">✕</button></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:var(--sl3)">'+alunos.length+'/'+cap+' alunos</span><span style="color:'+(vg===0?'#dc2626':'#16a34a')+';font-weight:700">'+(vg===0?'LOTADO':vg+' vaga(s)')+'</span></div>';
  alunos.forEach(function(a){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--borda)">';
    h+='<div style="flex:1;font-size:13px;font-weight:600">'+esc(a.nome)+'</div>';
    h+='<button class="btn btn-d btn-sm" data-aid="'+esc(a.id)+'" data-tid="'+esc(tid)+'" onclick="removerAlunoTurma(this.dataset.aid,this.dataset.tid)">Remover</button>';
    h+='</div>';
  });
  if(espera.length){
    h+='<div style="font-size:12px;font-weight:700;color:#d97706;margin:10px 0 6px">Lista de espera ('+espera.length+')</div>';
    espera.forEach(function(a){
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--borda)">';
      h+='<div style="flex:1;font-size:13px">'+esc(a.nome)+'</div>';
      if(vg>0)h+='<button class="btn btn-p btn-sm" data-aid="'+esc(a.id)+'" data-tid="'+esc(tid)+'" onclick="promoverListaEspera(this.dataset.aid,this.dataset.tid)">Matricular</button>';
      h+='</div>';
    });
  }
  abrirM(h);
}
function removerAlunoTurma(aid,tid){
  var a=DP.alunos.find(function(x){return x.id===aid;});if(!a)return;
  a.turmas=(a.turmas||[]).filter(function(t){return t!==tid;});
  salvarPilates();fecharM();irPil('turmas_pil');toast('Aluno removido da turma!');
}
function promoverListaEspera(aid,tid){
  var a=DP.alunos.find(function(x){return x.id===aid;});if(!a)return;
  a.listaEspera=(a.listaEspera||[]).filter(function(t){return t!==tid;});
  a.turmas=a.turmas||[];if(!a.turmas.includes(tid))a.turmas.push(tid);
  salvarPilates();fecharM();irPil('turmas_pil');toast('Aluno matriculado!');
}

function salvarAlunoPilates(){
  var aid=el('ap-id')?el('ap-id').value:'';
  var nome=el('ap-nome')?el('ap-nome').value.trim():'';
  if(!nome){toast('Nome obrigatório');return;}
  var turmasSel=[];document.querySelectorAll('.ap-turma:checked').forEach(function(c){turmasSel.push(c.value);});
  var restSel=[];document.querySelectorAll('.ap-rest:checked').forEach(function(c){restSel.push(c.value);});
  // Verificar lotação
  var lotados=turmasSel.filter(function(tid){
    var t=DP.turmas.find(function(x){return x.id===tid;});if(!t)return false;
    var nA=DP.alunos.filter(function(al){return al.id!==aid&&!al.inativo&&(al.turmas||[]).includes(tid);}).length;
    return nA>=(t.capacidade||6);
  });
  if(lotados.length&&!confirm('Algumas turmas estão lotadas. Adicionar mesmo assim?'))return;
  var a={id:aid||uid(),nome:nome,dataNasc:el('ap-nasc')?el('ap-nasc').value:'',celular:el('ap-cel')?el('ap-cel').value:'',
    objetivo:el('ap-obj')?el('ap-obj').value:'',nivel:el('ap-niv')?el('ap-niv').value:'Iniciante',
    restricoes:restSel,obs:el('ap-obs')?el('ap-obs').value:'',turmas:turmasSel,
    pacoteAulas:parseInt(el('ap-pacote')?el('ap-pacote').value:0)||0,
    valorAula:parseFloat(el('ap-valor')?el('ap-valor').value:0)||0,
    dtVenc:el('ap-venc')?el('ap-venc').value:''};
  if(aid){var idx=DP.alunos.findIndex(function(x){return x.id===aid;});if(idx>-1)DP.alunos[idx]=a;else DP.alunos.push(a);}
  else DP.alunos.push(a);
  salvarPilates();fecharM();irPil('alunos_pil');toast('Aluno salvo!');
}

  }
  // Botões de ação
  h+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">';

  else{h+='<button class="btn btn-p btn-sm" data-aid="'+esc(aid)+'" onclick="fecharM();reativarAlunoPil(this.dataset.aid)">Reativar</button>';}

  h+='</div>';
